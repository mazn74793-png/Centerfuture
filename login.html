<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Login</title>
  <style>
    :root { color-scheme: dark }
    * { box-sizing: border-box }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b1020;
      color: #e8ecff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    .logo {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg,#7c3aed,#06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }
    h2 { margin: 0 0 4px; font-size: 17px; }
    .muted { opacity: .55; font-size: 12px; margin-bottom: 18px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      padding: 8px 22px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      transition: all .2s;
    }
    .tab.active {
      background: linear-gradient(135deg,#7c3aed33,#06b6d433);
      border-color: #7c3aed99;
      color: #c4b5fd;
    }
    .field { margin-top: 13px; }
    label { font-size: 12px; opacity: .75; display: block; margin-bottom: 5px; }
    .req { color: #f87171; }
    input, select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.07);
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: #7c3aed88; }
    select option { background: #1a1f35; }
    .btn {
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg,#7c3aed,#06b6d4);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 15px;
      margin-top: 20px;
      width: 100%;
      transition: opacity .2s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 11px 14px;
      border-radius: 12px;
      font-size: 13px;
      display: none;
    }
    .msg.show { display: block; }
    .msg.err { background: #7f1d1d; border: 1px solid #991b1b; }
    .msg.ok  { background: #065f46; border: 1px solid #047857; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">MF</div>
  <h2 id="title">تسجيل الدخول</h2>
  <div class="muted">Make Future Center — منصة سنتر فرح</div>

  <div class="tabs">
    <div class="tab active" onclick="switchMode('login')"  id="tabLogin">دخول</div>
    <div class="tab"        onclick="switchMode('signup')" id="tabSignup">حساب جديد</div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox">
    <div class="field">
      <label>موبايل الطالب أو اسم المستخدم</label>
      <input id="loginValue" placeholder="01xxxxxxxxx أو username" autocomplete="username">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btnLogin" onclick="login()">دخول ←</button>
    <button type="button" onclick="forgotPassword()" style="margin-top:10px;width:100%;cursor:pointer;border:none;background:none;color:#a78bfa;font-size:13px;text-decoration:underline;padding:4px">نسيت كلمة المرور؟</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupBox" style="display:none">
    <div class="field">
      <label>اسم الطالب الكامل <span class="req">*</span></label>
      <input id="suName" placeholder="مثال: أحمد محمد">
    </div>
    <div class="field">
      <label>السنة الدراسية <span class="req">*</span></label>
      <select id="suGrade">
        <option value="">-- اختر --</option>
        <option value="3prep">3 إعدادي</option>
        <option value="1sec">1 ثانوي</option>
        <option value="2sec">2 ثانوي</option>
        <option value="3sec">3 ثانوي</option>
      </select>
    </div>
    <div class="field">
      <label>موبايل الطالب <span class="req">*</span></label>
      <input id="suPhone" placeholder="01xxxxxxxxx" maxlength="11">
    </div>
    <div class="field">
      <label>موبايل ولي الأمر <span style="opacity:.5">(اختياري)</span></label>
      <input id="suParent" placeholder="01xxxxxxxxx" maxlength="11">
    </div>
    <div class="field">
      <label>اسم المستخدم <span style="opacity:.5">(اختياري)</span></label>
      <input id="suUser" placeholder="بالإنجليزي فقط">
    </div>
    <div class="field">
      <label>كلمة المرور <span class="req">*</span></label>
      <input type="password" id="suPass" placeholder="6 أحرف على الأقل" autocomplete="new-password">
    </div>
    <button class="btn" id="btnSignup" onclick="signup()">إنشاء حساب ←</button>
  </div>

  <div id="msg" class="msg"></div>
</div>

<script>
const FN_BASE  = "https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4";

function showMsg(type, text){
  const m = document.getElementById("msg");
  m.className = "msg show " + (type==="ok" ? "ok" : "err");
  m.textContent = text;
}
function clearMsg(){
  const m = document.getElementById("msg");
  m.className = "msg"; m.textContent = "";
}
function switchMode(mode){
  document.getElementById("loginBox").style.display  = mode==="login"  ? "block" : "none";
  document.getElementById("signupBox").style.display = mode==="signup" ? "block" : "none";
  document.getElementById("tabLogin").classList.toggle("active",  mode==="login");
  document.getElementById("tabSignup").classList.toggle("active", mode==="signup");
  document.getElementById("title").textContent = mode==="login" ? "تسجيل الدخول" : "إنشاء حساب";
  clearMsg();
}

async function callFn(name, body){
  const res = await fetch(`${FN_BASE}/${name}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": ANON_KEY },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function signup(){
  clearMsg();
  const name  = document.getElementById("suName").value.trim();
  const grade = document.getElementById("suGrade").value;
  const phone = document.getElementById("suPhone").value.trim();
  const parent= document.getElementById("suParent").value.trim();
  const user  = document.getElementById("suUser").value.trim();
  const pass  = document.getElementById("suPass").value;

  if(!name||!grade||!phone||!pass){ showMsg("err","⚠️ اكمل البيانات المطلوبة"); return; }
  if(!/^01[0-9]{9}$/.test(phone)){ showMsg("err","⚠️ رقم الموبايل غير صحيح (11 رقم يبدأ بـ 01)"); return; }
  if(pass.length < 6){ showMsg("err","⚠️ كلمة المرور أقل من 6 أحرف"); return; }

  const btn = document.getElementById("btnSignup");
  btn.disabled = true; btn.textContent = "جاري التسجيل...";

  const data = await callFn("auth-signup", {
    full_name: name, grade,
    phone_student: phone,
    phone_parent: parent || null,
    username: user || null,
    password: pass
  });

  btn.disabled = false; btn.textContent = "إنشاء حساب ←";

  if(!data.ok){ showMsg("err","❌ " + (data.error || "خطأ في التسجيل")); return; }
  showMsg("ok","✅ تم التسجيل بنجاح! اضغط دخول الآن");
  setTimeout(()=> switchMode("login"), 1500);
}

async function login(){
  clearMsg();
  const loginVal = document.getElementById("loginValue").value.trim();
  const pass     = document.getElementById("loginPass").value;

  if(!loginVal||!pass){ showMsg("err","⚠️ اكتب البيانات"); return; }

  const btn = document.getElementById("btnLogin");
  btn.disabled = true; btn.textContent = "جاري الدخول...";

  const data = await callFn("auth-login", { login: loginVal, password: pass });

  btn.disabled = false; btn.textContent = "دخول ←";

  if(!data.ok){ showMsg("err","❌ " + (data.error || "بيانات الدخول غلط")); return; }

  // حفظ الـ JWT Token الحقيقي من Supabase Auth
  localStorage.setItem("mf_access_token",  data.access_token);
  localStorage.setItem("mf_refresh_token", data.refresh_token);
  localStorage.setItem("mf_user", JSON.stringify(data.user));

  showMsg("ok","✅ أهلاً " + data.user.name + "!");
  setTimeout(()=>{
    const role = data.user.role;
    if(role === "admin" || role === "superadmin") location.href = "admin.html";
    else location.href = "student.html";
  }, 700);
}

function forgotPassword(){
  const phone = document.getElementById("loginValue").value.trim();
  const text = encodeURIComponent(
    phone && /^01[0-9]{9}$/.test(phone)
      ? `مرحباً، نسيت كلمة المرور - Make Future\nرقم موبايلي: ${phone}\nأرجو مساعدتي في إعادة تعيين كلمة المرور 🙏`
      : `مرحباً، نسيت كلمة المرور - Make Future\nأرجو مساعدتي في إعادة تعيين كلمة المرور 🙏`
  );
  window.open(`https://wa.me/201210575530?text=${text}`, "_blank");
}
</script>
</body>
</html>
