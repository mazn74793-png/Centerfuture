<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Login</title>

  <style>
    :root{color-scheme:dark}
    body{
      margin:0;
      font-family:system-ui;
      background:#0b1020;
      color:#e8ecff;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px
    }
    .card{
      width:min(560px,100%);
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:20px;
      box-shadow:0 10px 40px rgba(0,0,0,.35)
    }
    h2{margin:0 0 6px}
    .muted{opacity:.8;font-size:13px}
    .tabs{display:flex;gap:8px;margin-top:12px}
    .tab{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      padding:8px 14px;
      border-radius:12px;
      font-weight:700
    }
    .tab.active{background:rgba(255,255,255,.15)}
    label{font-size:12px;opacity:.85}
    input,select{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
      color:#fff;
      margin-top:6px
    }
    button{
      cursor:pointer;
      border:none;
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
      color:#fff;
      padding:10px 16px;
      border-radius:12px;
      font-weight:800;
      margin-top:12px
    }
    .msg{
      margin-top:12px;
      padding:10px;
      border-radius:12px;
      display:none
    }
    .msg.show{display:block}
    .msg.err{background:#7f1d1d}
    .msg.ok{background:#065f46}
  </style>
</head>

<body>
<div class="card">

  <h2 id="title">تسجيل الدخول</h2>
  <div class="muted">Make Future Center</div>

  <div class="tabs">
    <div class="tab active" onclick="switchMode('login')" id="tabLogin">Login</div>
    <div class="tab" onclick="switchMode('signup')" id="tabSignup">Signup</div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox">
    <div style="margin-top:14px">
      <label>موبايل أو يوزر</label>
      <input id="loginValue" placeholder="01xxxxxxxxx أو username">
    </div>

    <div style="margin-top:10px">
      <label>باسورد</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>

    <button onclick="login()">دخول</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupBox" style="display:none">

    <div style="margin-top:14px">
      <label>اسم الطالب</label>
      <input id="suName">
    </div>

    <div style="margin-top:10px">
      <label>السنة الدراسية</label>
      <select id="suGrade">
        <option value="3prep">3 إعدادي</option>
        <option value="1sec">1 ثانوي</option>
        <option value="2sec">2 ثانوي</option>
        <option value="3sec">3 ثانوي</option>
      </select>
    </div>

    <div style="margin-top:10px">
      <label>موبايل الطالب</label>
      <input id="suPhone">
    </div>

    <div style="margin-top:10px">
      <label>موبايل ولي الأمر (اختياري)</label>
      <input id="suParent">
    </div>

    <div style="margin-top:10px">
      <label>يوزر (اختياري)</label>
      <input id="suUser">
    </div>

    <div style="margin-top:10px">
      <label>باسورد</label>
      <input type="password" id="suPass">
    </div>

    <button onclick="signup()">إنشاء حساب</button>
  </div>

  <div id="msg" class="msg"></div>

</div>

<script>

function switchMode(mode){
  document.getElementById("loginBox").style.display = mode==="login"?"block":"none";
  document.getElementById("signupBox").style.display = mode==="signup"?"block":"none";
  document.getElementById("tabLogin").classList.toggle("active",mode==="login");
  document.getElementById("tabSignup").classList.toggle("active",mode==="signup");
  document.getElementById("title").textContent = mode==="login"?"تسجيل الدخول":"إنشاء حساب";
  clearMsg();
}

function showMsg(type,text){
  const m=document.getElementById("msg");
  m.className="msg show "+(type==="ok"?"ok":"err");
  m.textContent=text;
}

function clearMsg(){
  const m=document.getElementById("msg");
  m.className="msg";
  m.textContent="";
}

async function signup(){
  clearMsg();

  const payload={
    full_name:suName.value.trim(),
    phone_student:suPhone.value.trim(),
    phone_parent:suParent.value.trim(),
    grade:suGrade.value.trim(),
    username:suUser.value.trim(),
    password:suPass.value.trim()
  };

  if(!payload.full_name||!payload.phone_student||!payload.grade||!payload.password){
    showMsg("err","املأ البيانات المطلوبة");
    return;
  }

  const res=await fetch("/.netlify/functions/signup",{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify(payload)
  });

  const data=await res.json();

  if(!res.ok||!data.ok){
    showMsg("err",data.error||"خطأ في التسجيل");
    return;
  }

  showMsg("ok","تم التسجيل بنجاح ✅ اعمل Login");
  switchMode("login");
}

async function login(){
  clearMsg();

  const payload={
    login:loginValue.value.trim(),
    password:loginPass.value.trim()
  };

  if(!payload.login||!payload.password){
    showMsg("err","اكتب البيانات");
    return;
  }

  const res=await fetch("/.netlify/functions/login",{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify(payload)
  });

  const data=await res.json();

  if(!res.ok||!data.ok){
    showMsg("err",data.error||"بيانات الدخول غلط");
    return;
  }

  localStorage.setItem("mf_user",JSON.stringify(data.user));

  showMsg("ok","تم تسجيل الدخول ✅");

  setTimeout(()=>{
    if(data.user.role==="superadmin"){
      location.href="admin.html";
    }else{
      location.href="student.html";
    }
  },600);
}

</script>
</body>
</html>
