<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Make Future | Admin Panel</title>

<style>
:root{color-scheme:dark}
body{
  margin:0;
  font-family:system-ui;
  background:#0b1020;
  color:#e8ecff;
  min-height:100vh;
  padding:20px;
}
.card{
  max-width:1200px;
  margin:auto;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,.35);
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.logo{
  width:45px;height:45px;border-radius:14px;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  display:grid;place-items:center;
  font-weight:900;
}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button,a{
  cursor:pointer;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  color:#fff;
  padding:8px 12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
}
button:hover,a:hover{background:rgba(255,255,255,.14)}
.tabBtns{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.tab{
  display:none;
  margin-top:20px;
}
.tab.active{display:block}
.box{
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:14px;
  margin-top:15px;
}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{
  border-bottom:1px solid rgba(255,255,255,.12);
  padding:10px;
  font-size:13px;
}
th{text-align:right;opacity:.8}
input,select{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);
  color:#fff;
}
</style>
</head>

<body>

<div class="card">

<div class="top">
  <div class="row">
    <div class="logo">MF</div>
    <div>
      <div style="font-size:18px;font-weight:900">Admin Dashboard</div>
      <div style="opacity:.7;font-size:13px">Make Future Control Panel</div>
    </div>
  </div>
  <div class="row">
    <a href="index.html">الرئيسية</a>
    <a href="student.html">طالب</a>
    <a href="admin-payments.html">طلبات الدفع</a>
    <button onclick="logout()">خروج</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabBtns">
  <button onclick="openTab('dashboard')">📊 Dashboard</button>
  <button onclick="openTab('courses')">🎓 Courses</button>
  <button onclick="openTab('schedules')">🗓️ Schedules</button>
  <button onclick="openTab('payments')">💳 Payments</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="tab active">
  <div class="box">
    <h3>ملخص سريع</h3>
    <div id="stats">Loading...</div>
  </div>
</div>

<!-- Courses -->
<div id="courses" class="tab">
  <div class="box">
    <h3>إضافة كورس</h3>
    <input id="cTitle" placeholder="اسم الكورس">
    <input id="cTeacher" placeholder="اسم المدرس" style="margin-top:8px">
    <button onclick="createCourse()" style="margin-top:10px">حفظ</button>
  </div>
</div>

<!-- Schedules -->
<div id="schedules" class="tab">
  <div class="box">
    <h3>المواعيد</h3>
    <div>اختار كورس من صفحة Courses علشان تعدل المواعيد.</div>
  </div>
</div>

<!-- Payments -->
<div id="payments" class="tab">
  <div class="box">
    <h3>طلبات الدفع</h3>
    <button onclick="loadPayments()">تحديث</button>
    <table>
      <thead>
        <tr>
          <th>طالب</th>
          <th>كورس</th>
          <th>طريقة</th>
          <th>إجراء</th>
        </tr>
      </thead>
      <tbody id="payTable"></tbody>
    </table>
  </div>
</div>

</div>

<script>
const me = JSON.parse(localStorage.getItem("mf_user")||"null");
if(!me || me.role!=="superadmin"){location.href="login.html"}

function logout(){
  localStorage.removeItem("mf_user");
  location.href="login.html";
}

function openTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function createCourse(){
  const title=document.getElementById("cTitle").value.trim();
  const teacher=document.getElementById("cTeacher").value.trim();
  if(!title||!teacher){alert("اكتب البيانات");return}
  await fetch("/.netlify/functions/admin_courses",{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify({grade:"3prep",subject:"Math",title,teacher_name:teacher,is_active:true})
  });
  alert("اتحفظ ✅");
}

async function loadPayments(){
  const res=await fetch("/.netlify/functions/admin_payments?status=pending");
  const data=await res.json();
  const tb=document.getElementById("payTable");
  tb.innerHTML="";
  data.payments.forEach(p=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${p.full_name}</td>
      <td>${p.course_title||""}</td>
      <td>${p.method}</td>
      <td>
        <button onclick="act(${p.id},'approve')">Approve</button>
        <button onclick="act(${p.id},'reject')">Reject</button>
      </td>
    `;
    tb.appendChild(tr);
  });
}

async function act(id,action){
  await fetch("/.netlify/functions/admin_payments",{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify({id,action})
  });
  loadPayments();
}
</script>

</body>
</html>
