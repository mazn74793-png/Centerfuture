<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Make Future | طلبات الدفع</title>
  <style>
    :root{color-scheme:dark}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;padding:20px}
    .card{max-width:1050px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    a,button{cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;padding:9px 13px;border-radius:12px;text-decoration:none;font-weight:800;font-size:13px}
    a:hover,button:hover{background:rgba(255,255,255,.14)}
    button.ok{border:none;background:linear-gradient(135deg,#16a34a,#06b6d4)}
    button.bad{border:none;background:linear-gradient(135deg,#dc2626,#7c3aed)}
    button.active-filter{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4)}
    .muted{opacity:.8;font-size:13px;line-height:1.7}
    .hr{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.14),transparent);margin:14px 0}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border-bottom:1px solid rgba(255,255,255,.1);padding:11px 10px;font-size:13px;vertical-align:top}
    th{text-align:right;opacity:.75;font-weight:600}
    .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800}
    .badge.pending{background:#78350f;color:#fde68a}
    .badge.approved{background:#064e3b;color:#6ee7b7}
    .badge.rejected{background:#450a0a;color:#fca5a5}
    .msg{margin-top:12px;padding:10px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);display:none;font-size:13px}
    .msg.show{display:block}
  </style>
</head>
<body>
<div class="card">
  <div class="row" style="justify-content:space-between">
    <div>
      <div style="font-size:18px;font-weight:900">💳 طلبات الدفع</div>
      <div class="muted">راجع الطلبات واعمل Approve أو Reject</div>
    </div>
    <div class="row">
      <a href="admin.html">← لوحة الأدمن</a>
      <a href="index.html">الرئيسية</a>
    </div>
  </div>

  <div class="hr"></div>

  <div class="row">
    <button id="btnPending" class="active-filter" onclick="load('pending')">⏳ Pending</button>
    <button id="btnApproved" onclick="load('approved')">✅ Approved</button>
    <button id="btnRejected" onclick="load('rejected')">❌ Rejected</button>
  </div>

  <div id="msg" class="msg"></div>

  <table>
    <thead>
      <tr>
        <th>الطالب</th>
        <th>الكورس</th>
        <th>تفاصيل الدفع</th>
        <th>التاريخ</th>
        <th>إجراء</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const FN  = "https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4";

const me = JSON.parse(localStorage.getItem("mf_user")||"null");
if(!me||!["admin","superadmin"].includes(me.role)) location.href="login.html";

const msgEl=document.getElementById("msg");
function showMsg(t){ msgEl.textContent=t; msgEl.className="msg show"; setTimeout(()=>msgEl.className="msg",3000); }

let currentStatus="pending";

async function load(status){
  currentStatus=status;
  ["pending","approved","rejected"].forEach(s=>{
    document.getElementById("btn"+s.charAt(0).toUpperCase()+s.slice(1)).classList.toggle("active-filter",s===status);
  });
  const tb=document.getElementById("tbody");
  tb.innerHTML=`<tr><td colspan="5" class="muted">Loading…</td></tr>`;
  const res=await fetch(`${FN}/admin-payments?status=${encodeURIComponent(status)}`,{headers:{"apikey":KEY}});
  const data=await res.json().catch(()=>({}));
  tb.innerHTML="";
  if(!data.ok){ tb.innerHTML=`<tr><td colspan="5" class="muted">❌ فشل التحميل</td></tr>`; return; }
  if(!data.payments?.length){ tb.innerHTML=`<tr><td colspan="5" class="muted">مفيش طلبات ${status}</td></tr>`; return; }
  data.payments.forEach(p=>{
    const date=p.created_at?new Date(p.created_at).toLocaleDateString("ar-EG",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>
        <b>${esc(p.full_name||"")}</b><br>
        📱 ${esc(p.phone_student||"—")}<br>
        <span class="muted">${esc(p.grade||"")}</span>
      </td>
      <td>
        <b>${esc(p.course_title||"—")}</b><br>
        ${esc(p.subject||"")} · ${esc(p.teacher_name||"")}
      </td>
      <td>
        طريقة: <b>${esc(p.method||"")}</b><br>
        المبلغ: <b>${p.amount||0} جنيه</b><br>
        رقم العملية: <b>${esc(p.transaction_id||"—")}</b><br>
        <span class="muted">${esc(p.receipt_note||"")}</span>
      </td>
      <td><span class="muted">${date}</span></td>
      <td>
        ${status==="pending"?`
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="ok" onclick="act(${p.id},'approve')">✅ قبول</button>
          <button class="bad" onclick="act(${p.id},'reject')">❌ رفض</button>
        </div>`:`<span class="badge ${status}">${status==="approved"?"مقبول":"مرفوض"}</span>`}
      </td>`;
    tb.appendChild(tr);
  });
}

async function act(id,action){
  const res=await fetch(`${FN}/admin-payments`,{
    method:"POST",
    headers:{"apikey":KEY,"Content-Type":"application/json"},
    body:JSON.stringify({id,action})
  });
  const data=await res.json().catch(()=>({}));
  if(!data.ok){ showMsg("❌ "+(data.error||"فشل")); return; }
  showMsg(action==="approve"?"✅ تم القبول — الطالب اتضاف للكورس تلقائياً":"❌ تم الرفض");
  load(currentStatus);
}

function esc(s){ return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

load("pending");
</script>
</body>
</html>
