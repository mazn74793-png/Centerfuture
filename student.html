<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Student</title>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(860px,100%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
    .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#06b6d4);display:grid;place-items:center;font-weight:900}
    .muted{opacity:.85;font-size:13px;line-height:1.6}
    a,button{cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:800}
    a:hover,button:hover{transform:translateY(-1px);background:rgba(255,255,255,.12)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
    .box{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}
    .hr{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.14),transparent);margin:14px 0}
    .tag{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);padding:6px 10px;border-radius:999px;font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="row">
        <div class="logo">MF</div>
        <div>
          <div style="font-size:18px;font-weight:900">Make Future</div>
          <div class="muted">لوحة الطالب</div>
        </div>
      </div>
      <div class="row">
        <a href="index.html">الرئيسية</a>
        <a href="payment.html">الدفع</a>
        <a href="https://wa.me/201210575530" target="_blank" rel="noreferrer">واتساب الدعم</a>
        <button onclick="logout()">خروج</button>
      </div>
    </div>

    <div class="hr"></div>

    <div class="grid">
      <div class="box">
        <div class="tag">👤 بيانات الحساب</div>
        <div style="margin-top:10px" id="who" class="muted">...</div>
      </div>

      <div class="box">
        <div class="tag">🎓 الخطوة الجاية</div>
        <div class="muted" style="margin-top:10px">
          دلوقتي هنعمل: عرض كورسات السنة + حالة الدفع + فتح مكتبة الفيديوهات بعد الموافقة.
        </div>
        <div class="row" style="margin-top:12px">
          <a href="payment.html">ارفع/تابع الدفع</a>
          <a href="login.html">تسجيل بحساب تاني</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function logout(){
      localStorage.removeItem("mf_user");
      location.href = "login.html";
    }
    const u = JSON.parse(localStorage.getItem("mf_user") || "null");
    const el = document.getElementById("who");
    if(!u){
      el.textContent = "مفيش Session — من فضلك اعمل Login تاني.";
      setTimeout(()=> location.href="login.html", 800);
    } else {
      el.innerHTML =
        "الاسم: <b>" + (u.full_name || "") + "</b><br>" +
        "الموبايل: <b>" + (u.phone_student || "") + "</b><br>" +
        "السنة: <b>" + (u.grade || "") + "</b><br>" +
        "الصلاحية: <b>" + (u.role || "") + "</b>";
    }
  </script>
</body>
</html>
