<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Make Future | الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07091a;--bg2:#0d1230;--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.1);--text:#eef0ff;--muted:rgba(238,240,255,.5);--grad:linear-gradient(135deg,#7c3aed,#06b6d4);--r:18px;color-scheme:dark}
[data-theme=light]{--bg:#f2f4ff;--bg2:#e6eaff;--card:rgba(255,255,255,.8);--border:rgba(0,0,0,.09);--text:#0d1230;--muted:rgba(13,18,48,.5);color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .35s,color .35s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 65% 50% at 12% 12%,rgba(124,58,237,.08) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 88% 88%,rgba(6,182,212,.06) 0%,transparent 55%);pointer-events:none;z-index:0}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.a0{opacity:0;animation:up .5s ease forwards}
.a1{animation-delay:.08s}.a2{animation-delay:.16s}.a3{animation-delay:.24s}.a4{animation-delay:.32s}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(22px);background:rgba(7,9,26,.84);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;animation:fi .4s ease}
[data-theme=light] nav{background:rgba(242,244,255,.9)}
.nav-logo{font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-row{display:flex;gap:7px;align-items:center}
.nb{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:7px 13px;border-radius:11px;text-decoration:none;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s}
.nb:hover{background:rgba(124,58,237,.18);border-color:#7c3aed77;transform:translateY(-1px)}
.thbtn{cursor:pointer;border:1px solid var(--border);background:var(--card);width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:15px;transition:all .25s}
.thbtn:hover{transform:rotate(22deg) scale(1.12)}
/* Layout */
.layout{max-width:1280px;margin:0 auto;padding:22px 18px;display:grid;grid-template-columns:1fr 340px;gap:20px;position:relative;z-index:1}
@media(max-width:920px){.layout{grid-template-columns:1fr}}
/* Player */
.course-heading{margin-bottom:14px}
.course-name{font-size:22px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.course-meta{font-size:13px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.progress-bar{height:4px;background:var(--border);border-radius:999px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--grad);border-radius:999px;transition:width .5s ease}
.player-box{width:100%;aspect-ratio:16/9;border-radius:var(--r);overflow:hidden;background:#000;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.5)}
.player-box iframe{width:100%;height:100%;border:none}
.video-info{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:14px;backdrop-filter:blur(10px)}
.video-info h3{font-size:16px;font-weight:800;margin-bottom:6px}
.video-info p{font-size:13px;color:var(--muted);line-height:1.7}
/* Playlist */
.pl-header{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pl-count{background:var(--grad);color:#fff;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:800}
.vid-card{cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;transition:all .22s;backdrop-filter:blur(8px)}
.vid-card:hover{border-color:#7c3aed55;transform:translateX(-3px);background:rgba(124,58,237,.08)}
.vid-card.on{border-color:#7c3aed;background:rgba(124,58,237,.15)}
.vid-num{width:30px;height:30px;flex-shrink:0;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-weight:900;font-size:12px;color:#fff;transition:all .2s}
.vid-card.on .vid-num{box-shadow:0 0 14px rgba(124,58,237,.7)}
.vid-body{flex:1;min-width:0}
.vid-body h4{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.4}
.vid-body p{font-size:12px;color:var(--muted)}
.play-ic{font-size:16px;flex-shrink:0;margin-top:3px;transition:all .2s;opacity:.6}
.vid-card:hover .play-ic,.vid-card.on .play-ic{opacity:1}
/* Locked */
.locked{max-width:540px;margin:60px auto;padding:0 18px;text-align:center}
.locked-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:48px 28px;backdrop-filter:blur(12px)}
.locked-icon{font-size:58px;margin-bottom:16px;animation:pulse 2s infinite}
.locked-box h2{font-size:22px;font-weight:900;margin-bottom:8px}
.locked-box p{color:var(--muted);font-size:14px;margin-bottom:24px;line-height:1.75}
.btn-grad{display:inline-block;border:none;background:var(--grad);color:#fff;padding:12px 28px;border-radius:14px;font-weight:800;font-size:14px;font-family:'Cairo',sans-serif;cursor:pointer;text-decoration:none;box-shadow:0 6px 24px rgba(124,58,237,.4);transition:all .25s}
.btn-grad:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(124,58,237,.58)}
/* Loading */
.loading{text-align:center;padding:80px 20px}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid var(--border);border-top-color:#7c3aed;animation:spin 1s linear infinite;margin:0 auto 14px}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MF — الكورس</div>
  <div class="nav-row">
    <a href="student.html" class="nb">← لوحة الطالب</a>
    <div class="thbtn" id="thb" onclick="toggleTheme()">🌙</div>
  </div>
</nav>

<div id="root" style="position:relative;z-index:1">
  <div class="loading"><div class="spin"></div><div style="color:var(--muted);font-size:14px">جاري تحميل الكورس…</div></div>
</div>

<script>
(function(){var t=localStorage.getItem('mf_theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');document.getElementById('thb').textContent=t==='light'?'☀️':'🌙';})();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);document.getElementById('thb').textContent=n==='light'?'☀️':'🌙';}

const FN="https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4";
const gradeMap={"3prep":"3 إعدادي","1sec":"1 ثانوي","2sec":"2 ثانوي","3sec":"3 ثانوي"};

const me=JSON.parse(localStorage.getItem('mf_user')||'null');
if(!me)location.href='login.html';

const cId=new URLSearchParams(location.search).get('id');
if(!cId)location.href='student.html';

function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}
async function api(fn,params){const r=await fetch(FN+'/'+fn+(params||''),{headers:{apikey:KEY}});return r.json().catch(()=>({}));}

function ytId(url){const m=url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}

let videos=[],curVid=null;

function playerHtml(v){
  const id=ytId(v.youtube_url||'');
  return id
    ?`<iframe src="https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&color=white" allowfullscreen allow="autoplay;encrypted-media;picture-in-picture"></iframe>`
    :`<div style="display:grid;place-items:center;height:100%;color:rgba(255,255,255,.35);font-size:14px">❌ رابط الفيديو غير صحيح</div>`;
}

function renderLayout(course){
  const prog=videos.length>1?((videos.indexOf(curVid)+1)/videos.length*100).toFixed(0):100;
  document.getElementById('root').innerHTML=`
    <div class="layout">
      <div>
        <div class="course-heading a0 a1">
          <div class="course-name">${esc(course?.title||'الكورس')}</div>
          <div class="course-meta">
            <span>👨‍🏫 ${esc(course?.teacher_name||'')}</span>
            <span>📘 ${esc(course?.subject||'')}</span>
            <span>📺 ${videos.indexOf(curVid)+1} / ${videos.length}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:${prog}%"></div></div>
        </div>
        <div class="player-box a0 a2" id="playerBox">${playerHtml(curVid)}</div>
        <div class="video-info a0 a3">
          <h3 id="vidTitle">${esc(curVid.title)}</h3>
          ${curVid.description?`<p id="vidDesc">${esc(curVid.description)}</p>`:'<p id="vidDesc" style="display:none"></p>'}
        </div>
      </div>
      <div class="a0 a4">
        <div class="pl-header">📋 محتوى الكورس <span class="pl-count">${videos.length} فيديو</span></div>
        <div id="playlist">${renderPlaylist()}</div>
      </div>
    </div>`;
}

function renderPlaylist(){
  return videos.map((v,i)=>`
    <div class="vid-card ${curVid?.id===v.id?'on':''}" onclick="playVid(${v.id})">
      <div class="vid-num">${i+1}</div>
      <div class="vid-body">
        <h4>${esc(v.title)}</h4>
        ${v.description?`<p>${esc(v.description.substring(0,55))}${v.description.length>55?'…':''}</p>`:''}
      </div>
      <div class="play-ic">${curVid?.id===v.id?'▶️':'▷'}</div>
    </div>`).join('');
}

function playVid(id){
  curVid=videos.find(v=>v.id===id)||videos[0];
  const idx=videos.indexOf(curVid);
  const prog=videos.length>1?((idx+1)/videos.length*100).toFixed(0):100;
  document.getElementById('playerBox').innerHTML=playerHtml(curVid);
  document.getElementById('vidTitle').textContent=curVid.title;
  const desc=document.getElementById('vidDesc');
  desc.textContent=curVid.description||'';
  desc.style.display=curVid.description?'':'none';
  document.getElementById('pFill').style.width=prog+'%';
  document.getElementById('playlist').innerHTML=renderPlaylist();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function init(){
  const isAdmin=['admin','superadmin'].includes(me.role);
  const [enrollData,videosData,coursesData]=await Promise.all([
    api('check-enrollment',`?user_id=${me.id}&course_id=${cId}`),
    api('course-videos',`?course_id=${cId}`),
    api('admin-courses',`?grade=&subject=`)
  ]);
  const course=(coursesData.courses||[]).find(c=>String(c.id)===String(cId));
  videos=videosData.videos||[];
  curVid=videos[0]||null;

  if(!enrollData.enrolled&&!isAdmin){
    document.getElementById('root').innerHTML=`
      <div class="locked a0 a1">
        <div class="locked-box">
          <div class="locked-icon">🔒</div>
          <h2>الكورس ده محتاج اشتراك</h2>
          <p>مش مسجل في الكورس ده لسه.<br>ادفع الاشتراك وبعد موافقة الأدمن هيفتحلك فوراً ✅</p>
          <a href="student.html" class="btn-grad">🎓 اختار كورس وادفع</a>
        </div>
      </div>`;
    return;
  }

  if(!videos.length){
    document.getElementById('root').innerHTML=`
      <div class="locked a0 a1">
        <div class="locked-box">
          <div class="locked-icon">📭</div>
          <h2>${esc(course?.title||'الكورس')}</h2>
          <p>المحتوى لسه بيتجهز… رجع تاني قريباً! 🚀</p>
          <a href="student.html" class="btn-grad">← رجوع</a>
        </div>
      </div>`;
    return;
  }

  renderLayout(course);
}

init();
</script>
</body>
</html>
