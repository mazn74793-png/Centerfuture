<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Make Future | الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05071a;--bg2:#080b22;--card:rgba(255,255,255,.042);--card2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e8ecff;--muted:rgba(200,210,255,.5);
  --p:#7c3aed;--p2:#06b6d4;--pg:linear-gradient(135deg,#7c3aed,#06b6d4);
  --glow1:rgba(124,58,237,.22);--glow2:rgba(6,182,212,.16);color-scheme:dark}
[data-theme=light]{
  --bg:#f0f2ff;--bg2:#e6e9ff;--card:rgba(255,255,255,.7);--card2:rgba(255,255,255,.9);
  --border:rgba(100,100,200,.12);--border2:rgba(100,100,200,.2);
  --text:#0d1230;--muted:rgba(30,40,120,.5);
  --glow1:rgba(124,58,237,.1);--glow2:rgba(6,182,212,.08);color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 15% 20%,var(--glow1),transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 80%,var(--glow2),transparent 60%);
  animation:bgPulse 8s ease-in-out infinite alternate}
@keyframes bgPulse{0%{opacity:.7}100%{opacity:1}}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;background:var(--pg);opacity:0;animation:floatP linear infinite}
@keyframes floatP{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.25}90%{opacity:.08}100%{transform:translateY(-80px) scale(1);opacity:0}}
nav{position:sticky;top:0;z-index:200;backdrop-filter:blur(28px) saturate(180%);
  background:rgba(5,7,26,.82);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
  animation:slideDown .5s cubic-bezier(.34,1.56,.64,1) both}
[data-theme=light] nav{background:rgba(240,242,255,.88)}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.nav-logo{font-size:17px;font-weight:900;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-row{display:flex;gap:6px;align-items:center}
.nb{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);
  padding:6px 13px;border-radius:10px;text-decoration:none;font-weight:700;font-size:12px;
  font-family:'Cairo',sans-serif;transition:all .25s}
.nb:hover{background:rgba(124,58,237,.15);border-color:var(--border2);transform:translateY(-1px)}
.thbtn{cursor:pointer;border:1px solid var(--border);background:var(--card);
  width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:14px;transition:all .25s}
.thbtn:hover{transform:rotate(20deg) scale(1.1)}
.wrap{max-width:1140px;margin:0 auto;padding:20px 16px;position:relative;z-index:1;
  display:grid;grid-template-columns:1fr 300px;gap:18px}
@media(max-width:840px){.wrap{grid-template-columns:1fr}}
.fade-up{opacity:0;animation:fadeUp .55s cubic-bezier(.34,1.36,.64,1) forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* ── VIDEO PLAYER ── */
.player-container{position:relative;border-radius:20px;overflow:hidden;
  background:#000;aspect-ratio:16/9;margin-bottom:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px var(--border);user-select:none}
.player-container video{width:100%;height:100%;display:block;object-fit:contain}
#vidWatermark{
  position:absolute;pointer-events:none;z-index:20;
  font-family:'Cairo',monospace;font-size:clamp(11px,1.6vw,15px);font-weight:700;
  color:rgba(255,255,255,.42);
  text-shadow:0 1px 8px rgba(0,0,0,.95),0 0 16px rgba(0,0,0,.7);
  letter-spacing:2px;user-select:none;white-space:nowrap;
  transition:top .9s ease,left .9s ease,right .9s ease,bottom .9s ease;
  display:none;top:8%;right:6%}
.yt-container{position:relative;border-radius:20px;overflow:hidden;
  aspect-ratio:16/9;margin-bottom:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px var(--border)}
.yt-container iframe{width:100%;height:100%;border:none;display:block}

/* video info */
.vid-info{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:16px 18px;margin-bottom:14px;backdrop-filter:blur(12px)}
.vid-title{font-size:18px;font-weight:900;margin-bottom:8px;line-height:1.4}
.vid-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.vid-badge{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);
  color:#a78bfa;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
.prog-wrap{margin-top:12px}
.prog-label{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px}
.prog-track{height:5px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:var(--pg);border-radius:999px;transition:width .6s cubic-bezier(.34,1.36,.64,1)}

/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);padding:5px;
  border-radius:13px;border:1px solid var(--border)}
.tbtn{cursor:pointer;border:none;background:transparent;color:var(--muted);
  padding:8px 16px;border-radius:10px;font-weight:700;font-size:13px;
  font-family:'Cairo',sans-serif;transition:all .25s;flex:1;text-align:center}
.tbtn.on{background:var(--pg);color:#fff;box-shadow:0 4px 18px var(--glow1)}
.tbtn:not(.on):hover{background:var(--card2);color:var(--text)}
.tpane{display:none;animation:fadeUp .3s ease}.tpane.on{display:block}

/* comments */
.cmt-item{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:13px 15px;margin-bottom:10px;transition:all .25s;animation:fadeUp .4s ease both}
.cmt-item:hover{border-color:var(--border2);transform:translateX(-2px)}
.cmt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.cmt-name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px}
.cmt-role-badge{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700;
  background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:#22d3ee}
.cmt-time{font-size:11px;color:var(--muted)}
.cmt-msg{font-size:13px;line-height:1.75;color:var(--text)}
.cmt-reply{margin-top:10px;background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.2);border-radius:11px;padding:10px 12px}
.cmt-reply-label{font-size:10px;color:#a78bfa;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.cmt-reply-text{font-size:12px;line-height:1.7}
.cmt-form-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-top:12px;transition:border-color .25s}
.cmt-form-wrap:focus-within{border-color:rgba(124,58,237,.5)}
.cmt-form-wrap textarea{width:100%;min-height:58px;padding:10px 0;border:none;
  background:transparent;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;resize:none;outline:none;line-height:1.7}
.cmt-form-wrap textarea::placeholder{color:var(--muted)}
.cmt-form-footer{display:flex;justify-content:flex-end;margin-top:6px;border-top:1px solid var(--border);padding-top:10px}
.btn-send{cursor:pointer;border:none;background:var(--pg);color:#fff;padding:8px 20px;
  border-radius:10px;font-weight:800;font-size:13px;font-family:'Cairo',sans-serif;
  transition:all .25s;box-shadow:0 4px 18px var(--glow1)}
.btn-send:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--glow1)}
.btn-send:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.empty-state{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.empty-state .icon{font-size:32px;margin-bottom:8px}

/* sidebar */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:16px;margin-bottom:14px;backdrop-filter:blur(10px);transition:border-color .25s}
.card:hover{border-color:var(--border2)}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;
  font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.card-icon{width:26px;height:26px;border-radius:8px;background:rgba(124,58,237,.2);
  display:grid;place-items:center;font-size:13px}

/* progress ring */
.prog-ring-wrap{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.prog-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.prog-ring svg{transform:rotate(-90deg)}
.prog-ring-bg{stroke:rgba(255,255,255,.08)}
.prog-ring-fill{stroke:url(#ringGrad);stroke-linecap:round;
  transition:stroke-dashoffset .9s cubic-bezier(.34,1.36,.64,1)}
.prog-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:14px;font-weight:900;
  background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.prog-ring-sub{font-size:8px;font-weight:700;color:var(--muted);-webkit-text-fill-color:var(--muted)}
.prog-info h4{font-size:14px;font-weight:800;margin-bottom:2px}
.prog-info p{font-size:11px;color:var(--muted)}

/* video list */
.vid-item{display:flex;gap:10px;align-items:center;padding:8px 10px;
  border-radius:11px;cursor:pointer;transition:all .2s;border:1px solid transparent;position:relative;overflow:hidden}
.vid-item::before{content:'';position:absolute;inset:0;background:var(--pg);opacity:0;transition:opacity .2s}
.vid-item:hover::before{opacity:.08}
.vid-item:hover{border-color:rgba(124,58,237,.3);transform:translateX(-2px)}
.vid-item.active::before{opacity:.15}
.vid-item.active{border-color:rgba(124,58,237,.5)}
.vid-num{width:28px;height:28px;flex-shrink:0;border-radius:8px;
  background:rgba(255,255,255,.08);display:grid;place-items:center;
  font-size:11px;font-weight:800;transition:all .2s;position:relative;z-index:1}
.vid-item.done .vid-num{background:rgba(6,182,212,.2);color:#22d3ee}
.vid-item.active .vid-num{background:var(--pg);color:#fff;box-shadow:0 0 12px var(--glow1)}
.vid-name{font-size:13px;font-weight:600;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:relative;z-index:1}
.vid-check{font-size:13px;flex-shrink:0;position:relative;z-index:1;transition:transform .3s}
.vid-item.done .vid-check{transform:scale(1.2)}

/* schedules */
.sched-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.sched-item:last-child{border-bottom:none}
.sched-day{font-weight:800;font-size:12px;background:var(--pg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-width:55px;flex-shrink:0}
.sched-time{font-size:12px;color:var(--muted)}

/* cert */
.cert-card{background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(6,182,212,.08));
  border:1px solid rgba(34,197,94,.25);border-radius:16px;padding:16px;
  text-align:center;margin-bottom:14px;animation:certPop .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes certPop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.cert-card h3{font-size:15px;font-weight:900;color:#4ade80;margin-bottom:4px}
.cert-card p{font-size:11px;color:var(--muted);margin-bottom:10px}
.cert-btn{display:block;cursor:pointer;border:1px solid rgba(34,197,94,.4);
  background:rgba(34,197,94,.15);color:#4ade80;padding:8px;border-radius:10px;
  font-weight:800;font-size:13px;font-family:'Cairo',sans-serif;
  text-align:center;text-decoration:none;transition:all .25s}
.cert-btn:hover{background:rgba(34,197,94,.25);transform:translateY(-1px)}

/* msg / spinner */
.msg{padding:10px 14px;border-radius:11px;font-size:13px;text-align:center;display:none;margin-bottom:10px;animation:fadeUp .3s ease}
.msg.show{display:block}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--p);animation:spin .8s linear infinite;margin:20px auto}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>

<nav>
  <div class="nav-logo">MF — Make Future</div>
  <div class="nav-row">
    <a href="student.html" class="nb">← رجوع</a>
    <div class="thbtn" id="thb" onclick="toggleTheme()">🌙</div>
  </div>
</nav>

<div class="wrap">
  <!-- MAIN -->
  <div>
    <div id="playerArea" class="fade-up" style="animation-delay:.05s"></div>

    <div class="vid-info fade-up" id="vidInfo" style="display:none;animation-delay:.1s">
      <div class="vid-title" id="vidTitle">—</div>
      <div class="vid-meta">
        <span class="vid-badge" id="vidTypeBadge">▶️ فيديو</span>
      </div>
      <div class="prog-wrap" id="vidProgWrap" style="display:none">
        <div class="prog-label"><span>تقدم المشاهدة</span><span id="vidProgLabel">0%</span></div>
        <div class="prog-track"><div class="prog-fill" id="vidProgFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="tabs fade-up" style="animation-delay:.15s">
      <button class="tbtn on" onclick="openTab('tabDesc',this)">📝 الوصف</button>
      <button class="tbtn" onclick="openTab('tabCmt',this)">💬 الأسئلة</button>
    </div>

    <div id="tabDesc" class="tpane on fade-up" style="animation-delay:.2s">
      <div class="card">
        <div id="vidDesc" style="font-size:14px;line-height:1.95;color:var(--text)">
          <div class="empty-state"><div class="icon">🎬</div>اختار فيديو من القائمة لتبدأ</div>
        </div>
      </div>
    </div>

    <div id="tabCmt" class="tpane fade-up" style="animation-delay:.2s">
      <div id="cmtMsg" class="msg"></div>
      <div id="cmtList"></div>
      <div class="cmt-form-wrap">
        <textarea id="cmtTxt" placeholder="اكتب سؤالك أو تعليقك هنا…" rows="3"></textarea>
        <div class="cmt-form-footer">
          <button class="btn-send" id="cmtBtn" onclick="sendComment()">إرسال ✈️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div>
    <div class="card fade-up" id="progCard" style="display:none;animation-delay:.1s">
      <div class="card-header"><div class="card-icon">📊</div>تقدمك في الكورس</div>
      <div class="prog-ring-wrap">
        <div class="prog-ring">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="prog-ring-bg" cx="32" cy="32" r="26" stroke-width="5" fill="none"/>
            <circle class="prog-ring-fill" id="ringCircle" cx="32" cy="32" r="26"
              stroke-width="5" fill="none" stroke-dasharray="163.4" stroke-dashoffset="163.4"/>
          </svg>
          <div class="prog-ring-text">
            <span id="progPct">0%</span>
            <span class="prog-ring-sub">مكتمل</span>
          </div>
        </div>
        <div class="prog-info">
          <h4 id="progTitle">—</h4>
          <p id="progCount"></p>
        </div>
      </div>
    </div>

    <div id="certCard" style="display:none" class="fade-up">
      <div class="cert-card">
        <h3>🎓 مبروك! أتممت الكورس</h3>
        <p id="certCode"></p>
        <a href="student.html" class="cert-btn">عرض الشهادة 🏆</a>
      </div>
    </div>

    <div class="card fade-up" style="animation-delay:.2s">
      <div class="card-header"><div class="card-icon">🎬</div>فيديوهات الكورس</div>
      <div id="vidList"><div class="spin"></div></div>
    </div>

    <div class="card fade-up" id="schedCard" style="display:none;animation-delay:.25s">
      <div class="card-header"><div class="card-icon">🗓️</div>مواعيد المجموعات</div>
      <div id="schedList"></div>
    </div>
  </div>
</div>

<script>
// ── THEME ──
(function(){
  var t=localStorage.getItem('mf_theme')||'dark';
  if(t==='light')document.documentElement.setAttribute('data-theme','light');
  document.getElementById('thb').textContent=t==='light'?'☀️':'🌙';
})();
function toggleTheme(){
  var c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('mf_theme',n);
  document.getElementById('thb').textContent=n==='light'?'☀️':'🌙';
}

// ── PARTICLES ──
(function(){
  const w=document.getElementById('particles');
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='particle';
    const s=Math.random()*4+2;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*20+15}s;animation-delay:${Math.random()*-20}s`;
    w.appendChild(p);
  }
})();

// ── CONSTANTS ──
const FN='https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4';

// ── AUTH CHECK ──
const me=JSON.parse(localStorage.getItem('mf_user')||'null');
if(!me){location.href='login.html';throw new Error('no auth');}
const course=JSON.parse(localStorage.getItem('mf_selected_course')||'null');
if(!course){location.href='student.html';throw new Error('no course');}

// رقم الطالب للـ watermark
const PHONE=me.phone_student||me.phone||'';

// ── STATE ──
let videos=[],progressMap={},curVid=null,saveTimer=null,wmTimer=null;

async function api(fn,method,body,params){
  const r=await fetch(FN+'/'+fn+(params||''),{
    method:method||'GET',
    headers:{apikey:KEY,'Content-Type':'application/json'},
    ...(body?{body:JSON.stringify(body)}:{})
  });
  return r.json().catch(()=>({}));
}
function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}

function openTab(id,btn){
  document.querySelectorAll('.tpane').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
  if(id==='tabCmt'&&curVid) loadComments(curVid.id);
}

// ══ WATERMARK ══
const WM_POS=[
  {top:'7%',right:'7%',left:'auto',bottom:'auto'},
  {top:'7%',left:'7%',right:'auto',bottom:'auto'},
  {bottom:'10%',right:'7%',left:'auto',top:'auto'},
  {bottom:'10%',left:'7%',right:'auto',top:'auto'},
  {top:'42%',right:'10%',left:'auto',bottom:'auto'},
  {top:'42%',left:'10%',right:'auto',bottom:'auto'},
  {top:'22%',right:'7%',left:'auto',bottom:'auto'},
  {bottom:'28%',left:'7%',right:'auto',top:'auto'},
];
let wmIdx=0;
function moveWatermark(){
  const el=document.getElementById('vidWatermark');
  if(!el)return;
  wmIdx=(wmIdx+Math.floor(Math.random()*3)+1)%WM_POS.length;
  Object.assign(el.style,WM_POS[wmIdx]);
}
function startWatermark(){
  if(!PHONE)return;
  stopWatermark();
  const el=document.getElementById('vidWatermark');
  if(el){el.style.display='block';moveWatermark();}
  wmTimer=setInterval(moveWatermark,4500);
}
function stopWatermark(){
  clearInterval(wmTimer);wmTimer=null;
  const el=document.getElementById('vidWatermark');
  if(el)el.style.display='none';
}

// ══ SAVE PROGRESS → يبعت watched_sec + duration_sec ══
async function saveProgress(videoId,watchedSec,durationSec){
  const r=await api('video-progress','POST',{
    user_id:me.id,
    video_id:videoId,
    course_id:course.id,
    watched_sec:Math.round(watchedSec||0),
    duration_sec:Math.round(durationSec||0)
  });
  // لو اكتمل → حدّث الـ UI
  if(r.completed&&!progressMap[String(videoId)]?.completed){
    progressMap[String(videoId)]={...(progressMap[String(videoId)]||{}),
      completed:true,watched_sec:Math.round(watchedSec),duration_sec:Math.round(durationSec)};
    const item=document.querySelector(`.vid-item[data-id="${videoId}"]`);
    if(item){
      item.classList.add('done');
      const ch=item.querySelector('.vid-check');
      if(ch)ch.textContent='✅';
    }
    loadCourseProgress();
  }
  return r;
}

// ══ PLAY VIDEO ══
async function playVideo(vid){
  curVid=vid;
  clearInterval(saveTimer);clearTimeout(saveTimer);saveTimer=null;
  stopWatermark();

  // sidebar highlight
  document.querySelectorAll('.vid-item').forEach(el=>{
    el.classList.toggle('active',String(el.dataset.id)===String(vid.id));
  });

  // info panel
  document.getElementById('vidTitle').textContent=vid.title;
  document.getElementById('vidTypeBadge').textContent=vid.video_type==='upload'?'🎞️ مرفوع':'▶️ يوتيوب';
  const descEl=document.getElementById('vidDesc');
  if(vid.description&&vid.description.trim()){
    descEl.textContent=vid.description;
    descEl.style.color='var(--text)';
  } else {
    descEl.innerHTML='<div class="empty-state"><div class="icon">📝</div>مفيش وصف لهذا الفيديو لسه</div>';
  }
  document.getElementById('vidInfo').style.display='block';

  // progress bar للفيديو
  const prog=progressMap[String(vid.id)];
  if(prog?.duration_sec>0){
    const pct=Math.min(100,Math.round((prog.watched_sec||0)/prog.duration_sec*100));
    document.getElementById('vidProgWrap').style.display='block';
    document.getElementById('vidProgFill').style.width=pct+'%';
    document.getElementById('vidProgLabel').textContent=pct+'%';
  } else {
    document.getElementById('vidProgWrap').style.display='none';
  }

  const area=document.getElementById('playerArea');

  // ── فيديو مرفوع ──
  if(vid.video_type==='upload'){
    area.innerHTML=`<div style="background:rgba(124,58,237,.08);border:1px solid var(--border);border-radius:20px;padding:30px;text-align:center;color:var(--muted)"><div class="spin"></div><div style="font-size:13px;margin-top:8px">جاري تحميل الفيديو…</div></div>`;

    const urlRes=await api('get-video-url','GET',null,`?video_id=${vid.id}&user_id=${me.id}`);
    if(!urlRes.ok){
      area.innerHTML=`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:20px;padding:30px;text-align:center;color:#f87171">❌ ${esc(urlRes.error||'فشل تحميل الفيديو')}</div>`;
      return;
    }

    area.innerHTML=`
      <div class="player-container" oncontextmenu="return false" id="playerBox">
        <video id="mainVid" controls controlsList="nodownload nofullscreen" disablePictureInPicture playsinline preload="metadata" src="${urlRes.url}"></video>
        <div id="vidWatermark">${esc(PHONE)}</div>
      </div>`;

    const videoEl=document.getElementById('mainVid');
    const savedSec=prog?.watched_sec||0;
    const savedDur=prog?.duration_sec||0;

    // استكمال من آخر نقطة
    if(savedSec>5){
      videoEl.addEventListener('loadedmetadata',()=>{
        if(videoEl.duration>0)
          videoEl.currentTime=Math.min(savedSec,videoEl.duration-2);
      },{once:true});
    }

    videoEl.addEventListener('play',startWatermark);
    videoEl.addEventListener('pause',()=>{
      stopWatermark();
      if(videoEl.currentTime>0)
        saveProgress(vid.id,videoEl.currentTime,videoEl.duration||savedDur);
    });
    videoEl.addEventListener('ended',()=>{
      stopWatermark();
      saveProgress(vid.id,videoEl.duration||savedDur,videoEl.duration||savedDur);
    });

    // حفظ كل 5 ثواني + تحديث الـ bar
    saveTimer=setInterval(()=>{
      if(videoEl.paused||videoEl.currentTime<=0)return;
      saveProgress(vid.id,videoEl.currentTime,videoEl.duration||savedDur);
      if(videoEl.duration>0){
        const pct=Math.min(100,Math.round(videoEl.currentTime/videoEl.duration*100));
        document.getElementById('vidProgWrap').style.display='block';
        document.getElementById('vidProgFill').style.width=pct+'%';
        document.getElementById('vidProgLabel').textContent=pct+'%';
      }
    },5000);

  } else {
    // ── يوتيوب ──
    let ytId='';
    try{
      const u=vid.youtube_url||'';
      if(u.includes('youtu.be/'))     ytId=u.split('youtu.be/')[1].split(/[?&]/)[0];
      else if(u.includes('v='))       ytId=new URL(u).searchParams.get('v');
      else                            ytId=u;
    }catch(e){ytId=vid.youtube_url||'';}

    area.innerHTML=`
      <div class="yt-container">
        <iframe src="https://www.youtube.com/embed/${encodeURIComponent(ytId)}?rel=0&modestbranding=1"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>
      </div>`;

    // ── يوتيوب: نحسب وقت المشاهدة كل 5 ثواني
    // المدة المفترضة = duration_sec من الـ DB أو 600 ثانية default
    const assumedDur=vid.duration_sec>0?vid.duration_sec:600;
    let ytWatched=prog?.watched_sec||0;

    saveTimer=setInterval(async()=>{
      ytWatched=Math.min(ytWatched+5,assumedDur+1);
      const pct=Math.min(100,Math.round(ytWatched/assumedDur*100));
      document.getElementById('vidProgWrap').style.display='block';
      document.getElementById('vidProgFill').style.width=pct+'%';
      document.getElementById('vidProgLabel').textContent=pct+'%';
      await saveProgress(vid.id,ytWatched,assumedDur);
      if(ytWatched>assumedDur){clearInterval(saveTimer);saveTimer=null;}
    },5000);
  }

  if(document.getElementById('tabCmt').classList.contains('on'))
    loadComments(vid.id);
}

// ══ LOAD VIDEOS LIST ══
async function loadVideos(){
  const d=await api('course-videos','GET',null,`?course_id=${course.id}`);
  videos=d.videos||[];
  const list=document.getElementById('vidList');

  if(!videos.length){
    list.innerHTML='<div class="empty-state"><div class="icon">📭</div>مفيش فيديوهات لسه</div>';
    return;
  }

  list.innerHTML=videos.map((v,i)=>{
    // نتحقق بالـ String عشان نضمن مطابقة الـ key
    const isDone=!!(progressMap[String(v.id)]?.completed);
    return `<div class="vid-item${isDone?' done':''}" data-id="${v.id}" style="animation-delay:${i*.04}s">
      <div class="vid-num">${i+1}</div>
      <div class="vid-name" title="${esc(v.title)}">${esc(v.title)}</div>
      <div class="vid-check">${isDone?'✅':'○'}</div>
    </div>`;
  }).join('');

  list.addEventListener('click',e=>{
    const item=e.target.closest('.vid-item');
    if(!item)return;
    const vid=videos.find(v=>String(v.id)===String(item.dataset.id));
    if(vid)playVideo(vid);
  });

  if(videos.length)playVideo(videos[0]);
}

// ══ COURSE PROGRESS (ring + cert) ══
async function loadCourseProgress(){
  const d=await api('video-progress','GET',null,`?user_id=${me.id}&course_id=${course.id}`);
  if(!d.ok)return;

  // بنبني الـ map بـ String keys عشان يطابق
  (d.progress||[]).forEach(p=>{progressMap[String(p.video_id)]=p;});

  const pct=d.percent||0;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progTitle').textContent=course.title;
  document.getElementById('progCount').textContent=`${d.completed_count} من ${d.total_count} فيديو`;
  document.getElementById('progCard').style.display='block';

  // SVG ring
  const circumference=163.4;
  document.getElementById('ringCircle').style.strokeDashoffset=
    circumference-(pct/100*circumference);

  // checkmarks
  (d.progress||[]).forEach(p=>{
    if(!p.completed)return;
    const el=document.querySelector(`.vid-item[data-id="${p.video_id}"]`);
    if(el){
      el.classList.add('done');
      const ch=el.querySelector('.vid-check');
      if(ch)ch.textContent='✅';
    }
  });

  // شهادة
  if(d.certificate){
    document.getElementById('certCard').style.display='block';
    document.getElementById('certCode').textContent='كود: '+(d.certificate.cert_code||'');
  }
}

// ══ COMMENTS ══
async function loadComments(videoId){
  const el=document.getElementById('cmtList');
  el.innerHTML='<div class="spin"></div>';
  const d=await api('video-comments','GET',null,`?video_id=${videoId}`);
  if(!d.ok){
    el.innerHTML=`<div class="empty-state"><div class="icon">⚠️</div>خطأ في تحميل التعليقات: ${d.error||'unknown'}</div>`;
    return;
  }
  if(!d.comments||!d.comments.length){
    el.innerHTML='<div class="empty-state"><div class="icon">💬</div>مفيش أسئلة لسه — كن أول واحد!</div>';
    return;
  }
  el.innerHTML=d.comments.map((c,i)=>`
    <div class="cmt-item" style="animation-delay:${i*.05}s">
      <div class="cmt-head">
        <div class="cmt-name">
          ${esc(c.user_name||'طالب')}
          ${(c.user_role==='admin'||c.user_role==='superadmin')?'<span class="cmt-role-badge">أستاذ</span>':''}
          ${c.is_pinned?'📌':''}
        </div>
        <span class="cmt-time">${new Date(c.created_at).toLocaleDateString('ar-EG')}</span>
      </div>
      <div class="cmt-msg">${esc(c.message)}</div>
      ${c.reply?`
        <div class="cmt-reply">
          <div class="cmt-reply-label">✏️ رد الأستاذ</div>
          <div class="cmt-reply-text">${esc(c.reply)}</div>
        </div>`:''}
    </div>`).join('');
}

async function sendComment(){
  if(!curVid)return;
  const txt=document.getElementById('cmtTxt').value.trim();
  const btn=document.getElementById('cmtBtn');
  const msgEl=document.getElementById('cmtMsg');
  if(!txt){msgEl.className='msg show err';msgEl.textContent='⚠️ اكتب سؤالك الأول';return;}
  btn.disabled=true;btn.textContent='جاري الإرسال…';
  const d=await api('video-comments','POST',{
    user_id:me.id,video_id:curVid.id,course_id:course.id,message:txt
  });
  btn.disabled=false;btn.textContent='إرسال ✈️';
  if(!d.ok){msgEl.className='msg show err';msgEl.textContent='❌ '+(d.error||'فشل');return;}
  msgEl.className='msg show ok';msgEl.textContent='✅ تم إرسال سؤالك!';
  document.getElementById('cmtTxt').value='';
  setTimeout(()=>{msgEl.className='msg';},2500);
  loadComments(curVid.id);
}

// ══ SCHEDULES ══
async function loadSchedules(){
  const d=await api('admin-schedules','GET',null,`?course_id=${course.id}`);
  if(!d.schedules?.length)return;
  document.getElementById('schedCard').style.display='block';
  document.getElementById('schedList').innerHTML=d.schedules.map(s=>`
    <div class="sched-item">
      <span class="sched-day">${esc(s.day_of_week)}</span>
      <span class="sched-time">${esc(s.start_time)} — ${esc(s.end_time)}
        ${s.notes?`<br><span style="font-size:11px">${esc(s.notes)}</span>`:''}
      </span>
    </div>`).join('');
}

// منع PrintScreen
document.addEventListener('keydown',e=>{if(e.key==='PrintScreen')e.preventDefault();});

// ── INIT (الترتيب مهم!) ──
document.title='Make Future | '+course.title;
(async()=>{
  await loadCourseProgress(); // ① يبني progressMap
  await loadVideos();         // ② يستخدم progressMap للـ checkmarks
  loadSchedules();
})();
</script>
