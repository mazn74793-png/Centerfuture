<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Make Future | الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07091a;--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.1);--text:#eef0ff;--muted:rgba(238,240,255,.5);--grad:linear-gradient(135deg,#7c3aed,#06b6d4);color-scheme:dark}
[data-theme=light]{--bg:#f2f4ff;--card:rgba(255,255,255,.85);--border:rgba(0,0,0,.09);--text:#0d1230;--muted:rgba(13,18,48,.5);color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 55% at 10% 10%,rgba(124,58,237,.08),transparent 55%),radial-gradient(ellipse 55% 45% at 88% 88%,rgba(6,182,212,.06),transparent 55%);pointer-events:none;z-index:0}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(22px);background:rgba(7,9,26,.84);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;animation:fi .4s ease}
[data-theme=light] nav{background:rgba(242,244,255,.9)}
.nav-logo{font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-row{display:flex;gap:7px;align-items:center}
.nb{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:7px 13px;border-radius:11px;text-decoration:none;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s}
.nb:hover{background:rgba(124,58,237,.18)}
.thbtn{cursor:pointer;border:1px solid var(--border);background:var(--card);width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:15px;transition:all .25s}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px;position:relative;z-index:1;display:grid;grid-template-columns:1fr 320px;gap:16px}
@media(max-width:820px){.wrap{grid-template-columns:1fr}}
.main{}
/* ── VIDEO PLAYER ── */
.player-wrap{position:relative;border-radius:18px;overflow:hidden;background:#000;aspect-ratio:16/9;margin-bottom:14px}
.player-wrap video{width:100%;height:100%;display:block;object-fit:contain}
/* واترمارك رقم الموبايل على الفيديو */
.vid-watermark{
  position:absolute;pointer-events:none;z-index:10;
  font-family:'Cairo',sans-serif;font-size:clamp(11px,2vw,15px);font-weight:700;
  color:rgba(255,255,255,0.55);text-shadow:0 1px 4px rgba(0,0,0,0.8);
  letter-spacing:1px;user-select:none;white-space:nowrap;
  transition:all 0.5s ease;
}
/* حماية ضد التسجيل */
.player-wrap::after{content:'';position:absolute;inset:0;z-index:9;pointer-events:none}
.yt-wrap{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:16/9;margin-bottom:14px}
.yt-wrap iframe{width:100%;height:100%;border:none}
.vid-info{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px;animation:up .4s ease}
.vid-title{font-size:17px;font-weight:900;margin-bottom:6px}
.vid-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
/* progress bar */
.prog-bar-wrap{height:6px;background:rgba(255,255,255,.1);border-radius:4px;margin:10px 0;overflow:hidden}
.prog-bar{height:100%;background:var(--grad);border-radius:4px;transition:width .4s}
/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tbtn{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);padding:7px 14px;border-radius:11px;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s}
.tbtn.on{background:rgba(124,58,237,.2);border-color:#7c3aed88;color:#c4b5fd}
.tpane{display:none;animation:up .3s ease}.tpane.on{display:block}
/* ── COMMENTS ── */
.cmt-item{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px;margin-bottom:10px}
.cmt-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.cmt-name{font-weight:700;color:var(--text)}
.cmt-msg{font-size:13px;line-height:1.7}
.cmt-reply{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:10px;padding:8px 10px;margin-top:8px;font-size:12px}
.cmt-reply-label{color:#06b6d4;font-weight:700;font-size:11px;margin-bottom:3px}
.cmt-form{display:flex;gap:8px;margin-top:12px}
.cmt-form textarea{flex:1;min-height:52px;padding:9px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;resize:none;outline:none;transition:border .2s}
[data-theme=light] .cmt-form textarea{background:rgba(0,0,0,.04)}
.cmt-form textarea:focus{border-color:#7c3aed88}
.btn-send{cursor:pointer;border:none;background:var(--grad);color:#fff;padding:9px 16px;border-radius:12px;font-weight:800;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s;align-self:flex-end}
.btn-send:hover{transform:translateY(-2px)}
.btn-send:disabled{opacity:.5;cursor:default;transform:none}
/* ── SIDEBAR ── */
.sidebar{}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:10px}
.vid-item{display:flex;gap:10px;align-items:center;padding:8px;border-radius:11px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.vid-item:hover{background:rgba(124,58,237,.1);border-color:#7c3aed44}
.vid-item.active{background:rgba(124,58,237,.18);border-color:#7c3aed88}
.vid-num{width:28px;height:28px;flex-shrink:0;border-radius:8px;background:rgba(255,255,255,.1);display:grid;place-items:center;font-size:11px;font-weight:800}
.vid-item.done .vid-num{background:rgba(6,182,212,.2);color:#06b6d4}
.vid-item.active .vid-num{background:var(--grad);color:#fff}
.vid-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.check{font-size:14px;flex-shrink:0}
.sched-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.sched-item:last-child{border-bottom:none}
.sched-day{font-weight:800;color:#c4b5fd;min-width:60px}
.cert-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:12px;text-align:center}
.cert-box h3{font-size:14px;font-weight:900;color:#4ade80;margin-bottom:4px}
.cert-box p{font-size:12px;color:var(--muted)}
.msg{padding:10px 14px;border-radius:11px;font-size:13px;text-align:center;display:none;margin-bottom:8px}
.msg.show{display:block}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:#7c3aed;animation:spin 1s linear infinite;margin:16px auto}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MF — Make Future</div>
  <div class="nav-row">
    <a href="student.html" class="nb">← رجوع</a>
    <div class="thbtn" id="thb" onclick="toggleTheme()">🌙</div>
  </div>
</nav>

<div class="wrap">
  <!-- MAIN -->
  <div class="main">
    <!-- Video Player Area -->
    <div id="playerArea"></div>

    <!-- Video Info -->
    <div class="vid-info" id="vidInfo" style="display:none">
      <div class="vid-title" id="vidTitle">—</div>
      <div class="vid-meta">
        <span id="vidType"></span>
        <span id="vidProgress"></span>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tbtn on" onclick="openTab('tabDesc',this)">📝 الوصف</button>
      <button class="tbtn" onclick="openTab('tabCmt',this)">💬 الأسئلة والتعليقات</button>
    </div>

    <div id="tabDesc" class="tpane on">
      <div class="card">
        <div id="vidDesc" class="muted" style="font-size:13px;line-height:1.9;color:var(--muted)">اختار فيديو من القائمة</div>
      </div>
    </div>

    <div id="tabCmt" class="tpane">
      <div class="card">
        <div id="cmtMsg" class="msg"></div>
        <div id="cmtList"><div class="spin"></div></div>
        <div class="cmt-form">
          <textarea id="cmtTxt" placeholder="اكتب سؤالك أو تعليقك هنا…" rows="2"></textarea>
          <button class="btn-send" id="cmtBtn" onclick="sendComment()">إرسال ✈️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- Course Progress -->
    <div class="card" id="courseProgCard" style="display:none">
      <div class="card-title">📊 تقدمك في الكورس</div>
      <div style="text-align:center;margin:6px 0">
        <span id="progPct" style="font-size:28px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">0%</span>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="courseProgBar" style="width:0%"></div></div>
      <div id="progCount" style="font-size:11px;color:var(--muted);text-align:center;margin-top:4px"></div>
    </div>

    <!-- Certificate -->
    <div id="certCard" style="display:none" class="card">
      <div class="cert-box">
        <h3>🎓 مبروك! أتممت الكورس</h3>
        <p id="certCode" style="margin:6px 0;font-size:11px"></p>
        <button class="nb" style="margin-top:8px;width:100%;text-align:center" onclick="location.href='student.html'">عرض الشهادة 🏆</button>
      </div>
    </div>

    <!-- Video List -->
    <div class="card">
      <div class="card-title">🎬 فيديوهات الكورس</div>
      <div id="vidList"><div class="spin"></div></div>
    </div>

    <!-- Schedules -->
    <div class="card" id="schedCard" style="display:none">
      <div class="card-title">🗓️ مواعيد المجموعات</div>
      <div id="schedList"></div>
    </div>
  </div>
</div>

<script>
(function(){var t=localStorage.getItem('mf_theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');document.getElementById('thb').textContent=t==='light'?'☀️':'🌙';})();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);document.getElementById('thb').textContent=n==='light'?'☀️':'🌙';}

const FN='https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4';

const me = JSON.parse(localStorage.getItem('mf_user')||'null');
if(!me){location.href='login.html';throw new Error('r');}
const course = JSON.parse(localStorage.getItem('mf_selected_course')||'null');
if(!course){location.href='student.html';throw new Error('r');}

// رقم موبايل الطالب للواترمارك
const PHONE = me.phone_student || me.phone || '';

let videos=[], progress={}, curVid=null, progressTimer=null, wmTimer=null;

async function api(fn,method,body,params){
  const r=await fetch(FN+'/'+fn+(params||''),{method:method||'GET',headers:{apikey:KEY,'Content-Type':'application/json'},...(body?{body:JSON.stringify(body)}:{})});
  return r.json().catch(()=>({}));
}

function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}
function openTab(id,btn){document.querySelectorAll('.tpane').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on');btn.classList.add('on');if(id==='tabCmt'&&curVid)loadComments(curVid.id);}

// ══════════════════════════════════════
// واترمارك رقم الموبايل جوا الفيديو
// ══════════════════════════════════════
function startWatermark(){
  stopWatermark();
  const el=document.getElementById('vidWatermark');
  if(!el)return;
  el.textContent=PHONE;
  moveWatermark();
  wmTimer=setInterval(moveWatermark,4000);
}
function stopWatermark(){
  if(wmTimer){clearInterval(wmTimer);wmTimer=null;}
}
function moveWatermark(){
  const el=document.getElementById('vidWatermark');
  if(!el)return;
  const positions=[
    {top:'8%',right:'8%',left:'auto',bottom:'auto'},
    {top:'8%',left:'8%',right:'auto',bottom:'auto'},
    {bottom:'12%',right:'8%',left:'auto',top:'auto'},
    {bottom:'12%',left:'8%',right:'auto',top:'auto'},
    {top:'45%',right:'12%',left:'auto',bottom:'auto'},
    {top:'45%',left:'12%',right:'auto',bottom:'auto'},
  ];
  const p=positions[Math.floor(Math.random()*positions.length)];
  el.style.top=p.top;el.style.bottom=p.bottom;
  el.style.right=p.right;el.style.left=p.left;
}

// ══════════════════════════════════════
// تشغيل الفيديو
// ══════════════════════════════════════
async function playVideo(vid){
  curVid=vid;
  stopWatermark();
  clearInterval(progressTimer);

  // highlight sidebar
  document.querySelectorAll('.vid-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.id==vid.id);
  });

  document.getElementById('vidTitle').textContent=vid.title;
  document.getElementById('vidType').textContent=vid.video_type==='upload'?'🎞️ فيديو مرفوع':'▶️ يوتيوب';
  document.getElementById('vidDesc').textContent=vid.description||'مفيش وصف لهذا الفيديو';
  document.getElementById('vidInfo').style.display='block';

  const area=document.getElementById('playerArea');
  const savedSec=(progress[vid.id]?.watched_sec||0);

  if(vid.video_type==='upload'){
    // الفيديو المرفوع — مع الواترمارك
    const urlRes=await api('get-video-url','GET',null,`?video_id=${vid.id}&user_id=${me.id}`);
    if(!urlRes.ok){
      area.innerHTML=`<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:14px;padding:30px;text-align:center;color:#f87171">❌ ${esc(urlRes.error||'فشل تحميل الفيديو')}</div>`;
      return;
    }
    area.innerHTML=`
      <div class="player-wrap" oncontextmenu="return false">
        <video id="mainVid" controlsList="nodownload nofullscreen" disablePictureInPicture
          playsinline preload="metadata"
          src="${urlRes.url}">
        </video>
        <div class="vid-watermark" id="vidWatermark">${esc(PHONE)}</div>
      </div>`;

    const videoEl=document.getElementById('mainVid');
    // استكمال من آخر نقطة
    if(savedSec>5){
      videoEl.addEventListener('loadedmetadata',()=>{videoEl.currentTime=savedSec;},{ once:true });
    }
    videoEl.addEventListener('play',()=>startWatermark());
    videoEl.addEventListener('pause',()=>stopWatermark());
    videoEl.addEventListener('ended',()=>stopWatermark());
    // حفظ التقدم كل 5 ثواني
    progressTimer=setInterval(()=>{
      if(!videoEl.paused&&videoEl.currentTime>0){
        saveProgress(vid.id,videoEl.currentTime,videoEl.duration||0);
      }
    },5000);
    // حفظ عند الإيقاف
    videoEl.addEventListener('pause',()=>saveProgress(vid.id,videoEl.currentTime,videoEl.duration||0));
    videoEl.addEventListener('ended',()=>saveProgress(vid.id,videoEl.duration||0,videoEl.duration||0));
    startWatermark();

  } else {
    // يوتيوب
    stopWatermark();
    let ytUrl=vid.youtube_url||'';
    let vid_id='';
    try{
      if(ytUrl.includes('youtu.be/')){vid_id=ytUrl.split('youtu.be/')[1].split('?')[0];}
      else if(ytUrl.includes('v=')){vid_id=new URL(ytUrl).searchParams.get('v');}
      else vid_id=ytUrl;
    }catch(e){vid_id=ytUrl;}
    area.innerHTML=`<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${encodeURIComponent(vid_id)}?rel=0&modestbranding=1" allowfullscreen></iframe></div>`;
    // حفظ progress للفيديوهات اليوتيوب بعد 30 ثانية
    progressTimer=setTimeout(()=>saveProgress(vid.id,30,120),30000);
  }

  // تحميل التعليقات لو التاب مفتوح
  if(document.getElementById('tabCmt').classList.contains('on')) loadComments(vid.id);
}

async function saveProgress(videoId,watchedSec,durationSec){
  const r=await api('video-progress','POST',{user_id:me.id,video_id:videoId,course_id:course.id,watched_sec:Math.round(watchedSec),duration_sec:Math.round(durationSec)||0});
  if(r.completed){
    // تحديث الـ sidebar
    const el=document.querySelector(`.vid-item[data-id="${videoId}"] .check`);
    if(el)el.textContent='✅';
    progress[videoId]={...(progress[videoId]||{}),completed:true};
    loadCourseProgress();
  }
}

// ══════════════════════════════════════
// تحميل الفيديوهات
// ══════════════════════════════════════
async function loadVideos(){
  const d=await api('course-videos','GET',null,`?course_id=${course.id}`);
  videos=d.videos||[];
  const list=document.getElementById('vidList');
  if(!videos.length){list.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">مفيش فيديوهات لسه</div>';return;}
  list.innerHTML=videos.map((v,i)=>`
    <div class="vid-item ${progress[v.id]?.completed?'done':''}" data-id="${v.id}" onclick="playVideo(${JSON.stringify(JSON.stringify(v))})">
      <div class="vid-num">${i+1}</div>
      <div class="vid-name">${esc(v.title)}</div>
      <div class="check">${progress[v.id]?.completed?'✅':'○'}</div>
    </div>`).join('');
  // تشغيل أول فيديو تلقائياً
  if(videos.length>0) playVideo(videos[0]);
}

// onclick بالطريقة الصح (مش JSON.stringify مكرر)
document.getElementById('vidList').addEventListener('click',e=>{
  const item=e.target.closest('.vid-item');
  if(!item)return;
  const vid=videos.find(v=>v.id==item.dataset.id);
  if(vid) playVideo(vid);
});

// ══════════════════════════════════════
// تقدم الكورس
// ══════════════════════════════════════
async function loadCourseProgress(){
  const d=await api('video-progress','GET',null,`?user_id=${me.id}&course_id=${course.id}`);
  if(!d.ok)return;
  // تحديث الـ progress map
  (d.progress||[]).forEach(p=>{progress[p.video_id]=p;});
  // تحديث الـ UI
  const pct=d.percent||0;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('courseProgBar').style.width=pct+'%';
  document.getElementById('progCount').textContent=`${d.completed_count} من ${d.total_count} فيديو مكتمل`;
  document.getElementById('courseProgCard').style.display='block';
  // تحديث checkmarks في القائمة
  (d.progress||[]).forEach(p=>{
    if(p.completed){
      const el=document.querySelector(`.vid-item[data-id="${p.video_id}"]`);
      if(el){el.classList.add('done');const ch=el.querySelector('.check');if(ch)ch.textContent='✅';}
    }
  });
  // شهادة
  if(d.certificate){
    document.getElementById('certCard').style.display='block';
    document.getElementById('certCode').textContent='كود الشهادة: '+d.certificate.cert_code;
  }
}

// ══════════════════════════════════════
// التعليقات — مصلحة
// ══════════════════════════════════════
async function loadComments(videoId){
  const el=document.getElementById('cmtList');
  el.innerHTML='<div class="spin"></div>';
  const d=await api('video-comments','GET',null,`?video_id=${videoId}`);
  if(!d.ok||!d.comments?.length){el.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px">مفيش تعليقات لسه — كن أول واحد! 💬</div>';return;}
  el.innerHTML=d.comments.map(c=>`
    <div class="cmt-item">
      <div class="cmt-head">
        <span class="cmt-name">${esc(c.user_name||'طالب')}${c.user_role==='admin'||c.user_role==='superadmin'?' 👨‍🏫':''}</span>
        <span>${new Date(c.created_at).toLocaleString('ar-EG')}</span>
      </div>
      <div class="cmt-msg">${esc(c.message)}</div>
      ${c.reply?`<div class="cmt-reply"><div class="cmt-reply-label">✏️ رد الأستاذ:</div>${esc(c.reply)}</div>`:''}
    </div>`).join('');
}

async function sendComment(){
  if(!curVid){return;}
  const txt=document.getElementById('cmtTxt').value.trim();
  const btn=document.getElementById('cmtBtn');
  const msgEl=document.getElementById('cmtMsg');
  if(!txt){msgEl.className='msg show err';msgEl.textContent='⚠️ اكتب تعليقك الأول';return;}
  btn.disabled=true;btn.textContent='جاري الإرسال…';
  // ✅ بنبعت course_id صح دلوقتي
  const d=await api('video-comments','POST',{
    user_id:me.id,
    video_id:curVid.id,
    course_id:course.id,
    message:txt
  });
  btn.disabled=false;btn.textContent='إرسال ✈️';
  if(!d.ok){msgEl.className='msg show err';msgEl.textContent='❌ '+(d.error||'فشل الإرسال');return;}
  msgEl.className='msg show ok';msgEl.textContent='✅ تم إرسال تعليقك!';
  document.getElementById('cmtTxt').value='';
  setTimeout(()=>{msgEl.className='msg';},2000);
  loadComments(curVid.id);
}

// ══════════════════════════════════════
// المواعيد
// ══════════════════════════════════════
async function loadSchedules(){
  const d=await api('admin-schedules','GET',null,`?course_id=${course.id}`);
  const scheds=d.schedules||[];
  if(!scheds.length)return;
  document.getElementById('schedCard').style.display='block';
  document.getElementById('schedList').innerHTML=scheds.map(s=>`
    <div class="sched-item">
      <span class="sched-day">${esc(s.day_of_week)}</span>
      <span>${esc(s.start_time)} — ${esc(s.end_time)}${s.notes?' · '+esc(s.notes):''}</span>
    </div>`).join('');
}

// ══════════════════════════════════════
// منع الـ keyboard shortcuts للتسجيل
// ══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='PrintScreen'){e.preventDefault();}
});

// ══════════════════════════════════════
// Init
// ══════════════════════════════════════
(async()=>{
  document.title='Make Future | '+course.title;
  await loadCourseProgress();
  await loadVideos();
  loadSchedules();
})();
</script>
