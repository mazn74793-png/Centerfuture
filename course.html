<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Make Future | الكورس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07091a;--bg2:#0d1230;--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.1);--text:#eef0ff;--muted:rgba(238,240,255,.5);--grad:linear-gradient(135deg,#7c3aed,#06b6d4);--r:18px;color-scheme:dark}
[data-theme=light]{--bg:#f2f4ff;--bg2:#e6eaff;--card:rgba(255,255,255,.8);--border:rgba(0,0,0,.09);--text:#0d1230;--muted:rgba(13,18,48,.5);color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(22px);background:rgba(7,9,26,.84);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
[data-theme=light] nav{background:rgba(242,244,255,.9)}
.nav-logo{font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nb{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:7px 13px;border-radius:11px;text-decoration:none;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s}
.nb:hover{background:rgba(124,58,237,.18)}
.thbtn{cursor:pointer;border:1px solid var(--border);background:var(--card);width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:15px}
.wrap{max-width:1200px;margin:0 auto;padding:18px;display:grid;grid-template-columns:1fr 340px;gap:18px}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
/* Video Player */
.player-wrap{background:#000;border-radius:18px;overflow:hidden;position:relative;aspect-ratio:16/9;width:100%}
/* Watermark overlay */
#watermark{position:absolute;z-index:20;font-size:13px;font-weight:900;color:rgba(255,255,255,0.22);pointer-events:none;user-select:none;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.5);transition:top .8s,left .8s}
/* Block right-click & screenshot hint */
.player-wrap::after{content:'';position:absolute;inset:0;z-index:10;pointer-events:none}
video{width:100%;height:100%;display:block;object-fit:contain}
iframe{width:100%;height:100%;border:none}
/* Progress bar */
.progress-outer{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:4px;margin-top:8px;overflow:hidden}
.progress-inner{height:100%;background:var(--grad);border-radius:4px;transition:width .3s}
.box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;backdrop-filter:blur(10px)}
[data-theme=light] .box{background:rgba(255,255,255,.7)}
.pill{display:inline-flex;gap:5px;align-items:center;border:1px solid var(--border);padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700}
.vid-item{padding:10px 12px;border-radius:12px;border:1px solid var(--border);margin-top:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
.vid-item:hover{border-color:#7c3aed66;background:rgba(124,58,237,.08)}
.vid-item.active{border-color:#7c3aed;background:rgba(124,58,237,.15)}
.vid-item.done .vi-icon{color:#22c55e}
.vi-icon{font-size:18px;flex-shrink:0}
.vi-info{flex:1;min-width:0}
.vi-title{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vi-dur{font-size:11px;color:var(--muted)}
/* Comments */
.comment{padding:10px 13px;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,.15);margin-top:8px;font-size:13px}
[data-theme=light] .comment{background:rgba(0,0,0,.04)}
.comment-name{font-weight:800;font-size:12px;color:#7c3aed;margin-bottom:3px}
.comment-reply{margin-top:8px;padding:8px 12px;border-radius:10px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);font-size:12px}
.reply-label{font-size:11px;font-weight:800;color:#06b6d4;margin-bottom:3px}
.btn{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:8px 14px;border-radius:11px;font-weight:800;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s}
.btn-grad{border:none;background:var(--grad);color:#fff}
.btn:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}
textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:10px;font-family:'Cairo',sans-serif;font-size:13px;resize:vertical;min-height:70px}
textarea:focus{outline:none;border-color:#7c3aed66}
/* Certificate */
.cert-banner{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(234,179,8,.1));border:1px solid rgba(245,158,11,.4);border-radius:16px;padding:16px;text-align:center;margin-top:12px}
.spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--border);border-top-color:#7c3aed;animation:spin 1s linear infinite;margin:16px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MF — Make Future</div>
  <div class="nav-row">
    <a href="student.html" class="nb">← رجوع</a>
    <div class="thbtn" id="thb" onclick="toggleTheme()">🌙</div>
  </div>
</nav>

<div class="wrap" id="mainWrap">
  <!-- Video side -->
  <div>
    <div id="playerSection">
      <div class="player-wrap" id="playerWrap">
        <div id="watermark">🔒 جار التحميل…</div>
        <div id="playerInner" style="width:100%;height:100%"></div>
      </div>
      <!-- Progress bar -->
      <div style="margin-top:8px;display:flex;align-items:center;gap:10px">
        <div class="progress-outer" style="flex:1"><div class="progress-inner" id="courseProgress" style="width:0%"></div></div>
        <span id="progressText" style="font-size:12px;font-weight:800;color:var(--muted);white-space:nowrap">0%</span>
      </div>
    </div>

    <!-- Video info -->
    <div style="margin-top:14px" class="box">
      <div id="vidTitle" style="font-size:18px;font-weight:900;margin-bottom:6px">جاري التحميل…</div>
      <div id="vidDesc" style="font-size:13px;color:var(--muted)"></div>
    </div>

    <!-- Certificate -->
    <div id="certSection" style="display:none"></div>

    <!-- Comments -->
    <div style="margin-top:14px" class="box">
      <div class="pill" style="margin-bottom:12px">💬 الأسئلة والتعليقات</div>
      <div id="commentsList"><div class="spin"></div></div>
      <div style="margin-top:12px">
        <textarea id="cmtInput" placeholder="اكتب سؤالك أو تعليقك هنا…"></textarea>
        <button class="btn btn-grad" style="margin-top:8px;width:100%" onclick="submitComment()">إرسال 📩</button>
      </div>
    </div>
  </div>

  <!-- Sidebar: video list -->
  <div>
    <div class="box">
      <div class="pill" style="margin-bottom:10px">🎬 قائمة الفيديوهات</div>
      <div id="videoList"><div class="spin"></div></div>
    </div>
  </div>
</div>

<script>
(function(){var t=localStorage.getItem('mf_theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');document.getElementById('thb').textContent=t==='light'?'☀️':'🌙';})();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);document.getElementById('thb').textContent=n==='light'?'☀️':'🌙';}

const FN  = 'https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4';

const me = JSON.parse(localStorage.getItem('mf_user')||'null');
if(!me){ location.href='login.html'; throw new Error('redirect'); }
const courseId = new URLSearchParams(location.search).get('id');
if(!courseId){ location.href='student.html'; throw new Error('redirect'); }

function esc(s){ return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }
async function apiFetch(slug,params,opts){
  try{
    const r=await fetch(FN+'/'+slug+(params||''),{headers:{apikey:KEY},...(opts||{})});
    return await r.json();
  }catch(e){return {ok:false,error:String(e)};}
}

let videos=[], currentVid=null, progressData={}, vidEl=null, progressInterval=null;

// ── Watermark ────────────────────────────────────────────────
const wm = document.getElementById('watermark');
function updateWatermark(){
  wm.textContent = '📵 ' + (me.phone||me.name||'طالب') + ' — Make Future';
  const pw = document.getElementById('playerWrap');
  const maxX = Math.max(0, pw.offsetWidth  - wm.offsetWidth  - 20);
  const maxY = Math.max(0, pw.offsetHeight - wm.offsetHeight - 20);
  wm.style.left = Math.random()*maxX + 'px';
  wm.style.top  = Math.random()*maxY + 'px';
}
setInterval(updateWatermark, 5000);

// block right-click on player
document.getElementById('playerWrap').addEventListener('contextmenu', e=>e.preventDefault());

// ── Load course data ─────────────────────────────────────────
async function init(){
  const [vids, prog] = await Promise.all([
    apiFetch('course-videos','?course_id='+courseId),
    apiFetch('video-progress','?user_id='+me.id+'&course_id='+courseId)
  ]);

  if(!vids.ok || !vids.videos?.length){
    document.getElementById('videoList').innerHTML='<div style="color:var(--muted);font-size:13px;padding:10px">لا توجد فيديوهات بعد</div>';
    return;
  }

  videos = vids.videos;
  if(prog.ok && prog.progress){
    prog.progress.forEach(p=>{ progressData[p.video_id]=p; });
  }

  // update course progress bar
  if(prog.ok){
    document.getElementById('courseProgress').style.width = prog.percent + '%';
    document.getElementById('progressText').textContent  = prog.percent + '%';
    if(prog.certificate) showCertificate(prog.certificate);
  }

  renderVideoList();
  // play first unwatched or first
  const firstUnwatched = videos.find(v=>!progressData[v.id]?.completed) || videos[0];
  playVideo(firstUnwatched);
}

function renderVideoList(){
  const el = document.getElementById('videoList');
  el.innerHTML = '';
  videos.forEach(v=>{
    const done = progressData[v.id]?.completed;
    const active = currentVid?.id === v.id;
    const div = document.createElement('div');
    div.className = 'vid-item' + (active?' active':'') + (done?' done':'');
    div.innerHTML =
      '<span class="vi-icon">'+(done?'✅':active?'▶️':'⭕')+'</span>'
      +'<div class="vi-info"><div class="vi-title">'+esc(v.title)+'</div>'
      +'<div class="vi-dur">'+(v.video_type==='upload'?'🎞️ مرفوع':'▶️ يوتيوب')+'</div></div>';
    div.onclick = ()=>playVideo(v);
    div.id = 'vi_'+v.id;
    el.appendChild(div);
  });
}

async function playVideo(v){
  if(progressInterval){ clearInterval(progressInterval); progressInterval=null; }
  currentVid = v;
  document.getElementById('vidTitle').textContent = v.title||'';
  document.getElementById('vidDesc').textContent  = v.description||'';
  const inner = document.getElementById('playerInner');
  inner.innerHTML = '';
  renderVideoList();

  if(v.video_type === 'upload'){
    // get signed URL
    const d = await apiFetch('get-video-url','?video_id='+v.id+'&user_id='+me.id);
    if(!d.ok){ inner.innerHTML='<div style="color:#f87171;padding:20px;text-align:center">⛔ '+esc(d.error)+'</div>'; return; }
    vidEl = document.createElement('video');
    vidEl.controls = true;
    vidEl.controlsList = 'nodownload';
    vidEl.disablePictureInPicture = true;
    vidEl.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000';
    vidEl.src = d.url;
    vidEl.addEventListener('contextmenu',e=>e.preventDefault());
    // save last position
    const saved = progressData[v.id]?.watched_sec;
    if(saved && saved>5){ vidEl.addEventListener('loadedmetadata',()=>{ vidEl.currentTime=saved; },{ once:true }); }
    inner.appendChild(vidEl);
    updateWatermark();
    // track progress every 5s
    progressInterval = setInterval(()=>saveProgress(v), 5000);
    vidEl.addEventListener('ended',()=>{ saveProgress(v,true); });
  } else {
    // YouTube
    const ytId = v.youtube_url?.split('v=')[1]?.split('&')[0] || v.youtube_url?.split('/').pop();
    const iframe = document.createElement('iframe');
    iframe.src = 'https://www.youtube.com/embed/'+ytId+'?rel=0&modestbranding=1';
    iframe.allow = 'accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.style.cssText='width:100%;height:100%;border:none';
    inner.appendChild(iframe);
    vidEl=null;
    updateWatermark();
  }
  loadComments();
}

async function saveProgress(v, force){
  if(!vidEl) return;
  const watched = Math.floor(vidEl.currentTime||0);
  const duration = Math.floor(vidEl.duration||0);
  if(watched<1 && !force) return;
  const d=await fetch(FN+'/video-progress',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({user_id:me.id,video_id:v.id,course_id:parseInt(courseId),watched_sec:watched,duration_sec:duration})});
  const r=await d.json().catch(()=>({}));
  if(r.ok){
    if(!progressData[v.id]) progressData[v.id]={};
    progressData[v.id].watched_sec=watched;
    progressData[v.id].completed=r.completed;
    renderVideoList();
    // refresh overall progress
    const prog=await apiFetch('video-progress','?user_id='+me.id+'&course_id='+courseId);
    if(prog.ok){
      document.getElementById('courseProgress').style.width=prog.percent+'%';
      document.getElementById('progressText').textContent=prog.percent+'%';
      if(prog.certificate) showCertificate(prog.certificate);
    }
  }
}

function showCertificate(cert){
  const el=document.getElementById('certSection');
  el.style.display='block';
  el.innerHTML='<div class="cert-banner" style="animation:up .5s ease"><div style="font-size:36px">🏆</div><div style="font-size:18px;font-weight:900;margin:8px 0">مبروك! أتممت الكورس بنجاح</div><div style="font-size:13px;color:var(--muted);margin-bottom:12px">كود شهادتك: <b style="color:#fbbf24">'+esc(cert.cert_code)+'</b></div><button class="btn" onclick="downloadCert(\''+esc(cert.cert_code)+'\')">⬇️ تحميل الشهادة</button></div>';
}

function downloadCert(code){
  const name=me.name||'الطالب';
  const course=document.getElementById('vidTitle').textContent||'الكورس';
  const date=new Date().toLocaleDateString('ar-EG');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>شهادة</title><style>body{font-family:Cairo,Tajawal,sans-serif;background:linear-gradient(135deg,#07091a,#0d1230);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.cert{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(6,182,212,.1));border:2px solid rgba(124,58,237,.4);border-radius:24px;padding:48px;max-width:700px;width:100%;text-align:center;box-shadow:0 0 60px rgba(124,58,237,.3)}
h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.name{font-size:28px;font-weight:900;color:#fbbf24;margin:18px 0}
.code{font-size:13px;color:rgba(255,255,255,.4);margin-top:18px}
@media print{body{background:#fff}}</style></head>
<body><div class="cert"><div style="font-size:48px">🏆</div><h1>شهادة إتمام</h1><p style="color:rgba(255,255,255,.6)">تُمنح هذه الشهادة إلى</p><div class="name">${name}</div><p style="color:rgba(255,255,255,.7)">لإتمامه بنجاح كورس</p><h2 style="margin:12px 0;font-size:22px">${course}</h2><p style="color:rgba(255,255,255,.5);font-size:13px">بتاريخ ${date}</p><p style="color:rgba(255,255,255,.4);font-size:13px;margin-top:4px">Make Future Center 🎓</p><div class="code">كود التحقق: ${code}</div></div></body></html>`);
  w.document.close();
  setTimeout(()=>w.print(),600);
}

// ── Comments ─────────────────────────────────────────────────
async function loadComments(){
  if(!currentVid) return;
  const el=document.getElementById('commentsList');
  el.innerHTML='<div class="spin"></div>';
  const d=await apiFetch('video-comments','?video_id='+currentVid.id);
  if(!d.ok||!d.comments?.length){ el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px">لا توجد تعليقات بعد — كن أول من يسأل! 💬</div>'; return; }
  el.innerHTML=d.comments.map(c=>`
    <div class="comment ${c.is_pinned?'':''}">
      ${c.is_pinned?'<span style="font-size:11px;color:#fbbf24;font-weight:800">📌 مثبت</span><br>':''}
      <div class="comment-name">${esc(c.user_name)} ${c.user_role==='admin'||c.user_role==='superadmin'?'👨‍🏫 (أستاذ)':''}</div>
      <div>${esc(c.message)}</div>
      ${c.reply?`<div class="comment-reply"><div class="reply-label">👨‍🏫 رد الأستاذ:</div><div>${esc(c.reply)}</div></div>`:''}
    </div>`).join('');
}

async function submitComment(){
  const inp=document.getElementById('cmtInput');
  const msg=inp.value.trim();
  if(!msg||!currentVid) return;
  inp.disabled=true;
  const d=await fetch(FN+'/video-comments',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({user_id:me.id,video_id:currentVid.id,course_id:parseInt(courseId),message:msg})});
  const r=await d.json().catch(()=>({}));
  if(r.ok){ inp.value=''; loadComments(); }
  else alert('خطأ: '+r.error);
  inp.disabled=false;
}

init();
</script>
</body>
</html>
