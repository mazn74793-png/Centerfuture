<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Make Future | الدفع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07091a;--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.1);--text:#eef0ff;--muted:rgba(238,240,255,.5);--grad:linear-gradient(135deg,#7c3aed,#06b6d4);color-scheme:dark}
[data-theme=light]{--bg:#f2f4ff;--card:rgba(255,255,255,.85);--border:rgba(0,0,0,.09);--text:#0d1230;--muted:rgba(13,18,48,.5);color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 55% at 10% 10%,rgba(124,58,237,.08),transparent 55%),radial-gradient(ellipse 55% 45% at 88% 88%,rgba(6,182,212,.06),transparent 55%);pointer-events:none;z-index:0}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(22px);background:rgba(7,9,26,.84);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;animation:fi .4s ease}
[data-theme=light] nav{background:rgba(242,244,255,.9)}
.nav-logo{font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-row{display:flex;gap:7px;align-items:center}
.nb{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:7px 13px;border-radius:11px;text-decoration:none;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;transition:all .2s}
.nb:hover{background:rgba(124,58,237,.18)}
.thbtn{cursor:pointer;border:1px solid var(--border);background:var(--card);width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:15px;transition:all .25s}
.wrap{max-width:560px;margin:0 auto;padding:28px 18px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;backdrop-filter:blur(12px)}
.steps{display:flex;gap:0;margin-bottom:28px;justify-content:center}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:grid;place-items:center;font-size:13px;font-weight:800;transition:all .3s}
.step.active .step-circle{border:none;background:var(--grad);color:#fff}
.step.done .step-circle{border:none;background:rgba(6,182,212,.2);color:#06b6d4}
.step-label{font-size:11px;color:var(--muted)}
.step-line{flex:1;height:2px;background:var(--border);margin-top:16px}
.step.done .step-line{background:linear-gradient(to right,#06b6d4,#7c3aed)}
.flabel{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block}
.field{margin-bottom:16px}
input,select,textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;transition:border .2s}
[data-theme=light] input,[data-theme=light] select,[data-theme=light] textarea{background:rgba(0,0,0,.05)}
input:focus,select:focus,textarea:focus{outline:none;border-color:#7c3aed88}
select option{background:#0d1230;color:#eef0ff}
.btn{width:100%;cursor:pointer;border:none;background:var(--grad);color:#fff;padding:13px;border-radius:14px;font-weight:900;font-size:15px;font-family:'Cairo',sans-serif;box-shadow:0 4px 18px rgba(124,58,237,.35);transition:all .2s;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.55)}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.course-box{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:14px;padding:14px;margin-bottom:20px}
.course-name{font-size:16px;font-weight:900}
.price-disp{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.price-orig{font-size:22px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.price-striked{font-size:16px;text-decoration:line-through;color:var(--muted)}
.discount-badge{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3);color:#4ade80;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:800}
.info-box{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:14px;font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:18px}
.coupon-row{display:flex;gap:8px;margin-bottom:16px}
.coupon-row input{flex:1}
.coupon-btn{cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);padding:11px 16px;border-radius:12px;font-weight:700;font-size:13px;font-family:'Cairo',sans-serif;white-space:nowrap;transition:all .2s}
.coupon-btn:hover{background:rgba(124,58,237,.2);border-color:#7c3aed77}
.msg{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:700;margin-top:12px;text-align:center}
.msg.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#4ade80}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#f87171}
.a0{opacity:0;animation:up .5s ease forwards}
.a1{animation-delay:.08s}.a2{animation-delay:.16s}.a3{animation-delay:.24s}.a4{animation-delay:.32s}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MF — Make Future</div>
  <div class="nav-row">
    <a href="student.html" class="nb">← رجوع</a>
    <div class="thbtn" id="thb" onclick="toggleTheme()">🌙</div>
  </div>
</nav>

<div class="wrap">
  <div class="steps a0 a1" style="margin-bottom:24px">
    <div class="step done"><div class="step-circle">1</div><div class="step-label">اختيار</div></div>
    <div class="step-line"></div>
    <div class="step active"><div class="step-circle">2</div><div class="step-label">الدفع</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-circle">3</div><div class="step-label">موافقة</div></div>
  </div>

  <div class="card a0 a2">
    <div id="noCourse" style="display:none;text-align:center;padding:20px;color:var(--muted)">
      ⚠️ مفيش كورس مختار — <a href="student.html" style="color:#7c3aed">ارجع للكورسات</a>
    </div>
    <div id="payForm">
      <div class="course-box">
        <div class="flabel">الكورس المختار</div>
        <div class="course-name" id="cName">—</div>
        <div class="price-disp">
          <span class="price-orig" id="finalPrice">0</span> جنيه
          <span class="price-striked" id="origPrice" style="display:none"></span>
          <span class="discount-badge" id="discBadge" style="display:none"></span>
        </div>
      </div>

      <div class="info-box">
        💳 ادفع على رقم: <b>01210575530</b><br>
        Vodafone Cash أو InstaPay<br>
        بعد الدفع اكتب رقم العملية وانتظر تأكيد الأدمن
      </div>

      <!-- Coupon -->
      <div class="field">
        <span class="flabel">🎟️ كود خصم (اختياري)</span>
        <div class="coupon-row">
          <input id="couponInput" type="text" placeholder="مثال: WELCOME20"/>
          <button class="coupon-btn" onclick="applyCoupon()">تطبيق</button>
        </div>
        <div id="couponMsg"></div>
      </div>

      <div class="field">
        <span class="flabel">طريقة الدفع</span>
        <select id="method">
          <option value="Vodafone Cash">Vodafone Cash</option>
          <option value="InstaPay">InstaPay</option>
        </select>
      </div>

      <div class="field">
        <span class="flabel">رقم العملية / Transaction ID</span>
        <input id="txId" type="text" placeholder="اكتب رقم العملية من الرسالة"/>
      </div>

      <div class="field">
        <span class="flabel">ملاحظات (اختياري)</span>
        <input id="notes" type="text" placeholder="أي تفاصيل إضافية"/>
      </div>

      <button class="btn" id="payBtn" onclick="submitPay()">💳 إرسال طلب الدفع</button>
      <div id="payMsg"></div>
    </div>
  </div>
</div>

<script>
(function(){var t=localStorage.getItem('mf_theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');document.getElementById('thb').textContent=t==='light'?'☀️':'🌙';})();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);document.getElementById('thb').textContent=n==='light'?'☀️':'🌙';}

const FN='https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4';

const me=JSON.parse(localStorage.getItem('mf_user')||'null');
if(!me){location.href='login.html';throw new Error('r');}
const selC=JSON.parse(localStorage.getItem('mf_selected_course')||'null');

let origAmount=0,finalAmount=0,appliedCoupon=null;

if(!selC){
  document.getElementById('noCourse').style.display='block';
  document.getElementById('payForm').style.display='none';
} else {
  origAmount=selC.price||0;
  finalAmount=origAmount;
  document.getElementById('cName').textContent=selC.title+' — '+selC.subject;
  document.getElementById('finalPrice').textContent=finalAmount;
}

async function applyCoupon(){
  const code=document.getElementById('couponInput').value.trim().toUpperCase();
  if(!code)return;
  const msgEl=document.getElementById('couponMsg');
  msgEl.innerHTML='<div style="font-size:12px;color:var(--muted)">جاري التحقق...</div>';
  const d=await fetch(FN+'/coupons',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({action:'validate',code:code,user_id:me.id})}).then(r=>r.json()).catch(()=>({}));
  if(!d.ok){
    msgEl.innerHTML='<div class="msg err">❌ '+(d.error||'كود غير صحيح')+'</div>';
    appliedCoupon=null;finalAmount=origAmount;
    document.getElementById('finalPrice').textContent=finalAmount;
    document.getElementById('origPrice').style.display='none';
    document.getElementById('discBadge').style.display='none';
    return;
  }
  const c=d.coupon;
  let discount=0;
  if(c.discount_type==='percent') discount=Math.round(origAmount*c.discount_value/100);
  else discount=Math.min(c.discount_value,origAmount);
  finalAmount=Math.max(0,origAmount-discount);
  appliedCoupon={id:c.id,code:c.code,discount};
  document.getElementById('finalPrice').textContent=finalAmount;
  document.getElementById('origPrice').textContent=origAmount+' جنيه';
  document.getElementById('origPrice').style.display='inline';
  document.getElementById('discBadge').textContent='خصم '+discount+' جنيه 🎉';
  document.getElementById('discBadge').style.display='inline';
  msgEl.innerHTML='<div class="msg ok">✅ تم تطبيق الكوبون! وفرت '+discount+' جنيه</div>';
}

async function submitPay(){
  const txId=document.getElementById('txId').value.trim();
  const notes=document.getElementById('notes').value.trim();
  const method=document.getElementById('method').value;
  const btn=document.getElementById('payBtn');
  const msgEl=document.getElementById('payMsg');
  if(!txId&&!notes){msgEl.innerHTML='<div class="msg err">❌ اكتب رقم العملية الأول</div>';return;}
  btn.disabled=true;btn.textContent='جاري الإرسال...';
  const body={user_id:me.id,course_id:selC.id,method,amount:origAmount,final_amount:finalAmount,transaction_id:txId||null,receipt_note:notes||null};
  if(appliedCoupon){body.coupon_id=appliedCoupon.id;}
  const d=await fetch(FN+'/create-payment',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()).catch(()=>({}));
  btn.disabled=false;btn.textContent='💳 إرسال طلب الدفع';
  if(!d.ok){msgEl.innerHTML='<div class="msg err">❌ '+d.error+'</div>';return;}
  msgEl.innerHTML='<div class="msg ok">✅ تم إرسال طلبك! انتظر موافقة الأدمن 🎉</div>';
  setTimeout(function(){location.href='student.html';},2000);
}
</script>
</body>
</html>
