<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Future | Payment</title>
  <style>
    :root{color-scheme:dark}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;padding:20px;display:grid;place-items:center}
    .card{width:min(720px,100%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    a,button{cursor:pointer;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:800}
    button.primary{border:none;background:linear-gradient(135deg,#7c3aed,#06b6d4)}
    input,select,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;outline:none}
    textarea{min-height:80px}
    .muted{opacity:.82;font-size:13px;line-height:1.6}
    .hr{height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.14),transparent);margin:14px 0}
    .box{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px}
    .msg{margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);display:none}
    .msg.show{display:block}
  </style>
</head>
<body>
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div>
        <div style="font-size:18px;font-weight:900">الدفع</div>
        <div class="muted">اختار طريقة الدفع وسجل رقم العملية/ملاحظة</div>
      </div>
      <div class="row">
        <a href="student.html">رجوع</a>
        <a href="https://wa.me/201210575530" target="_blank" rel="noreferrer">واتساب الدعم</a>
      </div>
    </div>

    <div class="hr"></div>

    <div class="box">
      <div class="muted" id="courseBox">…</div>
      <div class="muted" style="margin-top:8px">
        Vodafone Cash / InstaPay على: <b>01210575530</b><br>
        رقم تواصل إضافي: <b>01006693681</b>
      </div>
    </div>

    <div class="hr"></div>

    <div class="box">
      <div class="muted">طريقة الدفع</div>
      <select id="method" style="margin-top:8px">
        <option value="vodafone">Vodafone Cash</option>
        <option value="instapay">InstaPay</option>
      </select>

      <div class="muted" style="margin-top:10px">المبلغ (اختياري)</div>
      <input id="amount" placeholder="مثال: 300" />

      <div class="muted" style="margin-top:10px">رقم العملية / ملاحظة (مهم)</div>
      <textarea id="note" placeholder="مثال: رقم التحويل / آخر 4 أرقام / وقت التحويل…"></textarea>

      <div class="row" style="margin-top:12px">
        <button class="primary" onclick="sendPayment()">تأكيد إرسال طلب الدفع</button>
        <button onclick="openWhats()">مشكلة في الدفع؟</button>
      </div>

      <div id="msg" class="msg"></div>
    </div>
  </div>

<script>
  const me = JSON.parse(localStorage.getItem("mf_user") || "null");
  if(!me) location.href="login.html";

  const selectedCourse = JSON.parse(localStorage.getItem("mf_selected_course") || "null");
  const courseBox = document.getElementById("courseBox");
  if(!selectedCourse){
    courseBox.innerHTML = "مفيش كورس مختار — ارجع للطالب واختار كورس.";
  } else {
    courseBox.innerHTML = `الكورس: <b>${escapeHtml(selectedCourse.title)}</b> — <b>${escapeHtml(selectedCourse.subject)}</b> (ID: ${selectedCourse.id})`;
  }

  function show(text){
    const m = document.getElementById("msg");
    m.textContent = text;
    m.className = "msg show";
  }

  async function sendPayment(){
    if(!selectedCourse){
      show("اختار كورس الأول من صفحة الطالب.");
      return;
    }
    const payload = {
      user_id: me.id,
      course_id: selectedCourse.id,
      method: document.getElementById("method").value,
      amount: document.getElementById("amount").value.trim() || null,
      receipt_note: document.getElementById("note").value.trim()
    };

    if(!payload.receipt_note){
      show("اكتب رقم العملية / ملاحظة عشان الأدمن يقدر يراجع.");
      return;
    }

    show("جاري إرسال الطلب…");

    const res = await fetch("/.netlify/functions/create_payment", {
      method: "POST",
      headers: {"content-type":"application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json().catch(()=>({}));

    if(!res.ok || !data.ok){
      show(data.error || "حصل خطأ");
      return;
    }

    show("تم إرسال طلب الدفع ✅ (Pending) — هيتراجع عند الأدمن.");
    setTimeout(()=> location.href="student.html", 900);
  }

  function openWhats(){
    // يفتح واتساب مع رسالة جاهزة
    const text = encodeURIComponent(`عندي مشكلة في الدفع - Make Future
الاسم: ${me.full_name || ""}
موبايل: ${me.phone_student || ""}
الكورس: ${selectedCourse ? selectedCourse.title : "-"}
`);
    location.href = `https://wa.me/201210575530?text=${text}`;
  }

  function escapeHtml(s){ return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
</script>
</body>
</html>
