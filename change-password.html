<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Make Future | تغيير الباسورد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07091a;--card:rgba(255,255,255,.055);--border:rgba(255,255,255,.1);--text:#eef0ff;--muted:rgba(238,240,255,.5);--grad:linear-gradient(135deg,#7c3aed,#06b6d4);--r:18px;color-scheme:dark}
[data-theme=light]{--bg:#f2f4ff;--card:rgba(255,255,255,.8);--border:rgba(0,0,0,.09);--text:#0d1230;--muted:rgba(13,18,48,.5);color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px;transition:background .35s,color .35s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 65% 55% at 15% 15%,rgba(124,58,237,.08) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(6,182,212,.06) 0%,transparent 55%);pointer-events:none;z-index:0}
@keyframes pop{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card{position:relative;z-index:1;width:min(440px,100%);background:var(--card);border:1px solid var(--border);border-radius:22px;padding:32px 28px;backdrop-filter:blur(18px);box-shadow:0 40px 100px rgba(0,0,0,.45);animation:pop .6s cubic-bezier(.34,1.56,.64,1) both}
.icon{width:58px;height:58px;border-radius:18px;background:var(--grad);display:grid;place-items:center;font-size:22px;margin:0 auto 12px;box-shadow:0 8px 32px rgba(124,58,237,.45);animation:up .5s .1s both;opacity:0}
.title{font-size:20px;font-weight:900;text-align:center;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:up .5s .15s both;opacity:0}
.sub{font-size:13px;color:var(--muted);text-align:center;margin:4px 0 22px;animation:up .5s .2s both;opacity:0}
.info-box{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:13px;padding:12px 14px;font-size:13px;line-height:1.7;margin-bottom:20px;animation:up .5s .25s both;opacity:0}
.info-box b{color:#c4b5fd}
.field{margin-bottom:14px;animation:up .5s both;opacity:0}
.flabel{font-size:12px;color:var(--muted);margin-bottom:5px;display:block}
input{width:100%;padding:11px 14px;border-radius:13px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;outline:none;transition:all .2s}
[data-theme=light] input{background:rgba(0,0,0,.04)}
input:focus{border-color:#7c3aed88;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.btn-main{width:100%;padding:13px;border:none;background:var(--grad);color:#fff;border-radius:14px;font-weight:900;font-size:15px;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .25s;box-shadow:0 6px 24px rgba(124,58,237,.4);animation:up .5s .5s both;opacity:0}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,58,237,.55)}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-back{display:block;text-align:center;margin-top:12px;color:#a78bfa;font-size:13px;text-decoration:underline;text-underline-offset:3px;cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif;animation:up .5s .55s both;opacity:0;width:100%}
.msgbar{padding:12px 15px;border-radius:13px;font-size:13px;margin-top:12px;display:none}
.msgbar.show{display:block}
.msgbar.err{background:rgba(220,38,38,.15);border:1px solid #991b1b}
.msgbar.ok{background:rgba(6,78,59,.8);border:1px solid #047857}
.thbtn{position:fixed;top:14px;left:14px;z-index:200;cursor:pointer;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(14px);width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:15px;transition:all .25s}
.thbtn:hover{transform:rotate(22deg) scale(1.12)}
</style>
</head>
<body>
<div class="thbtn" id="thb" onclick="toggleTheme()">🌙</div>

<div class="card">
  <div class="icon">🔑</div>
  <div class="title">تغيير كلمة المرور</div>
  <div class="sub">اختار باسورد جديد قوي تفتكره</div>

  <div class="info-box">
    💡 لو أول مرة بتغيّر الباسورد، الباسورد الحالي = <b>رقم موبايلك</b>
  </div>

  <div class="field" style="animation-delay:.3s">
    <span class="flabel">كلمة المرور الحالية</span>
    <input id="oldPw" type="password" placeholder="••••••••"/>
  </div>
  <div class="field" style="animation-delay:.35s">
    <span class="flabel">كلمة المرور الجديدة</span>
    <input id="newPw" type="password" placeholder="6 أحرف على الأقل"/>
  </div>
  <div class="field" style="animation-delay:.4s">
    <span class="flabel">تأكيد كلمة المرور الجديدة</span>
    <input id="confPw" type="password" placeholder="••••••••"/>
  </div>

  <button class="btn-main" id="btnChg" onclick="changePassword()">تغيير الباسورد ✓</button>
  <button class="btn-back" onclick="goBack()">← رجوع</button>
  <div id="msg" class="msgbar"></div>
</div>

<script>
(function(){var t=localStorage.getItem('mf_theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');document.getElementById('thb').textContent=t==='light'?'☀️':'🌙';})();
function toggleTheme(){var c=document.documentElement.getAttribute('data-theme')||'dark',n=c==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('mf_theme',n);document.getElementById('thb').textContent=n==='light'?'☀️':'🌙';}

const FN="https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4";

const me=JSON.parse(localStorage.getItem('mf_user')||'null');
if(!me)location.href='login.html';

function showMsg(type,text){const m=document.getElementById('msg');m.className='msgbar show '+type;m.textContent=text;}
function goBack(){location.href=['admin','superadmin'].includes(me.role)?'admin.html':'student.html';}

async function changePassword(){
  const old=document.getElementById('oldPw').value;
  const nw=document.getElementById('newPw').value;
  const cf=document.getElementById('confPw').value;
  if(!old||!nw||!cf){showMsg('err','⚠️ اكمل كل الحقول');return;}
  if(nw.length<6){showMsg('err','⚠️ الباسورد الجديد أقل من 6 أحرف');return;}
  if(nw!==cf){showMsg('err','⚠️ تأكيد الباسورد مختلف');return;}
  const btn=document.getElementById('btnChg');btn.disabled=true;btn.textContent='جاري التغيير…';
  // Verify old password
  const lr=await fetch(FN+'/auth-login',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({login:me.phone,password:old})});
  const ld=await lr.json().catch(()=>({}));
  if(!ld.ok){btn.disabled=false;btn.textContent='تغيير الباسورد ✓';showMsg('err','❌ كلمة المرور الحالية غلط');return;}
  // Change
  const cr=await fetch(FN+'/change-password',{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({access_token:ld.access_token,new_password:nw})});
  const cd=await cr.json().catch(()=>({}));
  btn.disabled=false;btn.textContent='تغيير الباسورد ✓';
  if(!cd.ok){showMsg('err','❌ '+(cd.error||'فشل التغيير'));return;}
  localStorage.setItem('mf_access_token',ld.access_token);
  localStorage.setItem('mf_refresh_token',ld.refresh_token);
  showMsg('ok','✅ تم تغيير الباسورد بنجاح! 🎉');
  setTimeout(goBack,2000);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')changePassword();});
</script>
</body>
</html>
