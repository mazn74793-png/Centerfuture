<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Make Future | تغيير كلمة المرور</title>
  <style>
    :root{color-scheme:dark}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff;min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(480px,100%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:28px 24px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
    .logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
    h2{margin:0 0 4px;font-size:17px}
    .muted{opacity:.6;font-size:13px;margin-bottom:20px}
    .field{margin-bottom:14px}
    label{font-size:12px;opacity:.75;display:block;margin-bottom:5px}
    input{width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:14px;outline:none;transition:border-color .2s}
    input:focus{border-color:#7c3aed88}
    .btn{cursor:pointer;border:none;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;padding:12px 20px;border-radius:12px;font-weight:800;font-size:15px;width:100%;margin-top:6px;transition:opacity .2s}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-back{cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;padding:10px 20px;border-radius:12px;font-weight:700;font-size:14px;width:100%;margin-top:10px;text-decoration:none;display:block;text-align:center}
    .msg{margin-top:14px;padding:11px 14px;border-radius:12px;font-size:13px;display:none}
    .msg.show{display:block}
    .msg.err{background:#7f1d1d;border:1px solid #991b1b}
    .msg.ok{background:#065f46;border:1px solid #047857}
    .info-box{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.25);border-radius:12px;padding:12px 14px;margin-bottom:18px;font-size:13px;opacity:.9}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">MF</div>
  <h2>تغيير كلمة المرور</h2>
  <div class="muted">Make Future Center</div>

  <div class="info-box" id="infoBox">
    ⚠️ لو دخلت أول مرة بعد النقل، كلمة مرورك الحالية هي <b>رقم موبايلك</b>.
  </div>

  <div class="field">
    <label>كلمة المرور الحالية</label>
    <input type="password" id="currentPass" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <div class="field">
    <label>كلمة المرور الجديدة</label>
    <input type="password" id="newPass" placeholder="6 أحرف على الأقل" autocomplete="new-password"/>
  </div>
  <div class="field">
    <label>تأكيد كلمة المرور الجديدة</label>
    <input type="password" id="confirmPass" placeholder="••••••••" autocomplete="new-password"/>
  </div>

  <button class="btn" id="btnChange" onclick="changePassword()">💾 حفظ كلمة المرور الجديدة</button>
  <a id="backLink" href="student.html" class="btn-back">← رجوع</a>

  <div id="msg" class="msg"></div>
</div>

<script>
const FN  = "https://anlstahxxpbbfnwrwulu.supabase.co/functions/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFubHN0YWh4eHBiYmZud3J3dWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQzMTIsImV4cCI6MjA4ODEyMDMxMn0.4RQxQ4AZZCVCswTRdJoZ7Jz9qNwQq0fPs7vitnMJ3A4";

const me = JSON.parse(localStorage.getItem("mf_user")||"null");
if(!me) location.href="login.html";

// لو أدمن يرجع للأدمن
if(me.role==="admin"||me.role==="superadmin"){
  document.getElementById("backLink").href="admin.html";
}

function showMsg(type,text){
  const m=document.getElementById("msg");
  m.className="msg show "+type; m.textContent=text;
}

async function changePassword(){
  const currentPass = document.getElementById("currentPass").value;
  const newPass     = document.getElementById("newPass").value;
  const confirmPass = document.getElementById("confirmPass").value;

  if(!currentPass||!newPass||!confirmPass){ showMsg("err","⚠️ اكمل كل الحقول"); return; }
  if(newPass.length < 6){ showMsg("err","⚠️ كلمة المرور الجديدة أقل من 6 أحرف"); return; }
  if(newPass !== confirmPass){ showMsg("err","⚠️ كلمة المرور الجديدة مش متطابقة"); return; }
  if(newPass === currentPass){ showMsg("err","⚠️ كلمة المرور الجديدة نفس القديمة!"); return; }

  const btn=document.getElementById("btnChange");
  btn.disabled=true; btn.textContent="جاري التحقق…";

  // أول خطوة: تأكيد الباسورد القديم عن طريق login
  const loginRes = await fetch(`${FN}/auth-login`,{
    method:"POST",
    headers:{"apikey":KEY,"Content-Type":"application/json"},
    body: JSON.stringify({login: me.phone, password: currentPass})
  });
  const loginData = await loginRes.json().catch(()=>({}));

  if(!loginData.ok){
    btn.disabled=false; btn.textContent="💾 حفظ كلمة المرور الجديدة";
    showMsg("err","❌ كلمة المرور الحالية غلط"); return;
  }

  btn.textContent="جاري الحفظ…";

  // تغيير الباسورد
  const res = await fetch(`${FN}/change-password`,{
    method:"POST",
    headers:{"apikey":KEY,"Content-Type":"application/json"},
    body: JSON.stringify({
      access_token: loginData.access_token,
      new_password: newPass
    })
  });
  const data = await res.json().catch(()=>({}));

  btn.disabled=false; btn.textContent="💾 حفظ كلمة المرور الجديدة";

  if(!data.ok){ showMsg("err","❌ "+(data.error||"فشل تغيير كلمة المرور")); return; }

  // تحديث التوكن الجديد
  localStorage.setItem("mf_access_token",  loginData.access_token);
  localStorage.setItem("mf_refresh_token", loginData.refresh_token);

  // إخفاء رسالة التحذير
  document.getElementById("infoBox").style.display="none";

  showMsg("ok","✅ تم تغيير كلمة المرور بنجاح!");
  setTimeout(()=>{
    location.href = (me.role==="admin"||me.role==="superadmin") ? "admin.html" : "student.html";
  }, 1500);
}
</script>
</body>
</html>
